<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Menu</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
background:white;
padding:15px;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #eee;
}

.search{
padding:10px;
background:white;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

.categories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
}

.cat{
padding:8px 15px;
margin-right:10px;
background:#eee;
border-radius:20px;
white-space:nowrap;
font-size:14px;
}

.menu{
padding:10px;
}

.item{
background:white;
border-radius:12px;
padding:10px;
margin-bottom:10px;
display:flex;
gap:10px;
}

.item img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.item-info{
flex:1;
}

.item-name{
font-weight:bold;
}

.item-price{
color:#00a54f;
font-weight:bold;
}

.add-btn{
background:#00a54f;
color:white;
border:none;
border-radius:8px;
padding:5px 10px;
font-size:16px;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#00a54f;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
ร้านเครื่องดื่ม
</div>

<div class="search">
<input placeholder="ค้นหาเมนู">
</div>

<div class="categories" id="categories"></div>

<div class="menu" id="menu"></div>

<div class="cart" id="cart">
ดูตะกร้า (0)
</div>

<script src="js/menu.js"></script>

</body>
</html>
