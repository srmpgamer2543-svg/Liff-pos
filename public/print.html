<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

img{
  max-width:100%;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h3 id="status">Loading...</h3>
<img id="preview"/>

<script>
async function main(){

  const status = document.getElementById("status")
  const preview = document.getElementById("preview")

  try{

    const params = new URLSearchParams(location.search)

    // 🔥 force chrome
    if(params.get("external")==="1"){
      const url = location.href.replace("external=1","external=0")
      location.href =
        "intent://" + url.replace("https://","") +
        "#Intent;scheme=https;package=com.android.chrome;end;"
      return
    }

    await liff.init({ liffId:"2009308319-yTnMMIYi" })

    const orderId = params.get("order_id")
    if(!orderId){
      status.innerText = "no order_id"
      return
    }

    status.innerText = "Loading order..."

    const res = await fetch(`/api/get-order?order_id=${orderId}`)
    const order = await res.json()

    // ======================
    // 🧾 canvas
    // ======================
    const canvas = document.createElement("canvas")
    const ctx = canvas.getContext("2d")

    const width = 384
    let y = 40

    canvas.width = width
    canvas.height = 2000

    ctx.fillStyle = "#fff"
    ctx.fillRect(0,0,width,2000)

    ctx.fillStyle = "#000"
    ctx.font = "24px monospace"

    function t(x){ ctx.fillText(x,10,y); y+=28 }
    function c(x){
      const w = ctx.measureText(x).width
      ctx.fillText(x,(width-w)/2,y)
      y+=30
    }
    function line(){ t("-----------------------------") }

    c("ร้านน้ำ")
    c("DRINK SHOP")
    line()
    t("Order #" + order.id)
    line()

    let total = 0

    order.items.forEach(i=>{
      total += i.price
      t(i.name)
      t("= " + i.price + " บาท")
      line()
    })

    ctx.font = "bold 26px monospace"
    t("รวม " + total + " บาท")

    y+=20
    ctx.font = "22px monospace"
    c("ขอบคุณครับ")

    // crop
    const final = document.createElement("canvas")
    final.width = width
    final.height = y+20
    final.getContext("2d").drawImage(canvas,0,0)

    const dataUrl = final.toDataURL("image/png")

    // ======================
    // 👀 preview
    // ======================
    preview.src = dataUrl
    status.innerText = "Preparing print..."

    // ======================
    // 🚀 send to rawbt
    // ======================
    setTimeout(()=>{
      location.href = "rawbt:" + dataUrl
    },400)

  }catch(err){
    status.innerText = "ERROR: " + err.message
  }
}

main()
</script>

</body>
</html>
