<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

img{
  max-width:100%;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h3 id="status">Loading...</h3>
<img id="preview"/>

<script>
async function main(){

  const status = document.getElementById("status")
  const preview = document.getElementById("preview")

  try{

    const params = new URLSearchParams(location.search)

    // 🔥 force chrome
    if(params.get("external")==="1"){
      const url = location.href.replace("external=1","external=0")
      location.href =
        "intent://" + url.replace("https://","") +
        "#Intent;scheme=https;package=com.android.chrome;end;"
      return
    }

    await liff.init({ liffId:"2009308319-yTnMMIYi" })

    const orderId = params.get("order_id")
    if(!orderId){
      status.innerText = "no order_id"
      return
    }

    status.innerText = "Loading order..."

    const res = await fetch(`/api/get-order?order_id=${orderId}`)
    const order = await res.json()

    // ======================
    // 🧾 canvas (iOS STYLE)
    // ======================
    const canvas = document.createElement("canvas")
    const ctx = canvas.getContext("2d")

    const width = 384
    const scale = 2

    canvas.width = width * scale
    canvas.height = 2000 * scale

    ctx.scale(scale, scale)

    let y = 30

    ctx.fillStyle = "#fff"
    ctx.fillRect(0,0,width,2000)

    ctx.fillStyle = "#000"

    // ========= helpers =========
    function center(text, size=26, bold=false){
      ctx.font = `${bold?"bold ":""}${size}px -apple-system, BlinkMacSystemFont, sans-serif`
      const w = ctx.measureText(text).width
      ctx.fillText(text,(width-w)/2,y)
      y += size + 6
    }

    function left(text, size=22, bold=false){
      ctx.font = `${bold?"bold ":""}${size}px -apple-system, BlinkMacSystemFont, sans-serif`
      ctx.fillText(text,10,y)
      y += size + 6
    }

    function right(text, size=22, bold=false){
      ctx.font = `${bold?"bold ":""}${size}px -apple-system, BlinkMacSystemFont, sans-serif`
      const w = ctx.measureText(text).width
      ctx.fillText(text,width-w-10,y)
      y += size + 6
    }

    function row(l,r,size=22,bold=false){
      ctx.font = `${bold?"bold ":""}${size}px -apple-system, BlinkMacSystemFont, sans-serif`
      ctx.fillText(l,10,y)
      const w = ctx.measureText(r).width
      ctx.fillText(r,width-w-10,y)
      y += size + 6
    }

    function line(){
      ctx.fillRect(10,y,width-20,1.5)
      y += 12
    }

    function gap(h=10){ y+=h }

    function formatMods(modifiers){
      if(!modifiers) return []

      const result=[]

      Object.values(modifiers).forEach(arr=>{
        const map={}
        arr.forEach(m=>{
          const name = typeof m==="object"?m.name:m
          const price = typeof m==="object"?m.price||0:0

          if(!map[name]) map[name]={count:0,price}
          map[name].count++
        })

        Object.entries(map).forEach(([name,data])=>{
          result.push({
            name,
            qty:data.count,
            price:data.price
          })
        })
      })

      return result
    }

    // ========= HEADER =========
    center("ร้านน้ำ",28,true)
    center("DRINK SHOP",22,false)
    gap(6)
    line()

    left("Order #" + order.id,20,true)
    line()

    gap(6)

    // ========= ITEMS =========
    let total = 0

    order.items.forEach(i=>{

      const itemTotal = i.price
      total += itemTotal

      // ชื่อสินค้า
      left(i.name,22,true)

      // modifier
      const mods = formatMods(i.modifiers)

      mods.forEach(m=>{
        const name = m.qty > 1 ? `${m.name} x${m.qty}` : m.name
        const price = m.price ? `+${m.price * m.qty}` : ""

        row("  + " + name, price ? price+"฿" : "",18,false)
      })

      // ราคา item
      row(" ", itemTotal + "฿",22,true)

      gap(4)
      line()
      gap(6)

    })

    // ========= TOTAL =========
    row("รวม", total + " บาท",26,true)

    gap(10)

    center("ขอบคุณครับ",20,false)

    gap(20)

    // ======================
    // ✂️ crop
    // ======================
    const final = document.createElement("canvas")
    final.width = width
    final.height = y + 10

    const fctx = final.getContext("2d")
    fctx.fillStyle="#fff"
    fctx.fillRect(0,0,final.width,final.height)
    fctx.drawImage(canvas,0,0)

    const dataUrl = final.toDataURL("image/png")

    // ======================
    // 👀 preview
    // ======================
    preview.src = dataUrl
    status.innerText = "Preparing print..."

    // ======================
    // 🚀 send to rawbt
    // ======================
    setTimeout(()=>{
      location.href = "rawbt:" + dataUrl
    },400)

  }catch(err){
    status.innerText = "ERROR: " + err.message
  }
}

main()
</script>

</body>
</html>
