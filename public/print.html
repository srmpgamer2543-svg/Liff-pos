<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}
img{
  max-width:100%;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h3 id="status">Loading...</h3>
<img id="preview"/>

<script>
async function main(){

  const status = document.getElementById("status")
  const preview = document.getElementById("preview")

  try{

    const params = new URLSearchParams(location.search)

    if(params.get("external")==="1"){
      const url = location.href.replace("external=1","external=0")
      location.href =
        "intent://" + url.replace("https://","") +
        "#Intent;scheme=https;package=com.android.chrome;end;"
      return
    }

    await liff.init({ liffId:"2009308319-yTnMMIYi" })

    const orderId = params.get("order_id")
    if(!orderId){
      status.innerText = "no order_id"
      return
    }

    status.innerText = "Loading order..."

    const res = await fetch(`/api/get-order?order_id=${orderId}`)
    const order = await res.json()

    const canvas = document.createElement("canvas")
    const ctx = canvas.getContext("2d")

    const width = 384

    // =========================
    // 🎯 CONFIG (ปรับได้ทั้งหมด)
    // =========================
    const CFG = {
      LEFT: 12,
      RIGHT: width - 12,

      START_Y: 30,

      FONT_TITLE: 24,
      FONT_SUB: 20,
      FONT_NORMAL: 20,
      FONT_SMALL: 20,

      SPACE_TEXT: 16,
      SPACE_SECTION: 16,

      // 🔥 ปรับเส้นแยกจุด
      LINE_HEADER_OFFSET: -14,
      LINE_INFO_OFFSET: -14,
      LINE_TOTAL_OFFSET: -16,

      LINE_WIDTH: 1.2,
      LINE_DASH: [4,2]
    }

    let y = CFG.START_Y

    canvas.width = width
    canvas.height = 2000

    ctx.fillStyle = "#fff"
    ctx.fillRect(0,0,width,2000)
    ctx.fillStyle = "#000"

    // ========= helpers =========
    function center(text, size=CFG.FONT_NORMAL, bold=false){
      ctx.font = `${bold?"bold ":""}${size}px monospace`
      ctx.textAlign = "center"
      ctx.fillText(text, width/2, y)
      y += size + CFG.SPACE_TEXT
    }

    function left(text, size=CFG.FONT_NORMAL, bold=false){
      ctx.font = `${bold?"bold ":""}${size}px monospace`
      ctx.textAlign = "left"
      ctx.fillText(text, CFG.LEFT, y)
      y += size + CFG.SPACE_TEXT
    }

    function row(l,r,size=CFG.FONT_NORMAL,bold=false){
      ctx.font = `${bold?"bold ":""}${size}px monospace`

      ctx.textAlign = "left"
      ctx.fillText(l, CFG.LEFT, y)

      ctx.textAlign = "right"
      ctx.fillText(r, CFG.RIGHT, y)

      y += size + CFG.SPACE_TEXT
    }

    // ✅ เส้นแบบควบคุมละเอียด
    function dashedLine(offset=0){
      const lineY = y + offset

      ctx.setLineDash(CFG.LINE_DASH)
      ctx.lineWidth = CFG.LINE_WIDTH

      ctx.beginPath()
      ctx.moveTo(CFG.LEFT, lineY)
      ctx.lineTo(CFG.RIGHT, lineY)
      ctx.stroke()

      ctx.setLineDash([])

      y += CFG.SPACE_SECTION
    }

    function gap(h){ y += h }

    // ========= LOGO RECEIPT =========
const img = new Image()
img.src = "/logo-receipt.png"

await new Promise((resolve) => {
  img.onload = resolve
  img.onerror = resolve
})

if(img.complete && img.naturalWidth !== 0){

  const logoWidth = 320
  const logoHeight = 300
  const logoX = (width - logoWidth) / 2

  ctx.drawImage(img, logoX, y, logoWidth, logoHeight)

  y += logoHeight + 10
}
    
    // ========= HEADER =========
    center("", CFG.FONT_TITLE, true)
    center("▪️◾️◾️◼️◼️◼️⬛ ⬛ ⬛◼️◼️◼️◾️◾️▪️", CFG.FONT_SUB, true)
    center("pos:เจ้าของร้าน", CFG.FONT_SMALL)

    dashedLine(CFG.LINE_HEADER_OFFSET)

    const now = new Date()
    const date = now.toLocaleDateString("th-TH")
    const time = now.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})

    row(`วันที่: ${date}`, `เวลา: ${time}`)
    left(`Order: #${order.id}`)

    dashedLine(CFG.LINE_INFO_OFFSET)

    // ========= ITEMS =========
    let subtotal = 0

    order.items.forEach(i=>{

      subtotal += i.price

      left(i.name, CFG.FONT_SUB, true)

      row(` 1 x ${i.price}`, i.price)

      if(i.modifiers){

        const map = {}

        Object.values(i.modifiers).forEach(arr=>{
          arr.forEach(m=>{
            const name = typeof m==="object"?m.name:m
            const price = typeof m==="object"?m.price||0:0

            if(!map[name]){
              map[name] = { count:0, price }
            }
            map[name].count++
          })
        })

        Object.entries(map).forEach(([name,data])=>{
          const qty = data.count > 1 ? ` x${data.count}` : ""
          const priceText = data.price ? `+${data.price * data.count}` : ""

          row(
            "   + " + name + qty,
            priceText,
            CFG.FONT_SMALL
          )
        })
      }

      gap(4)
    })

    dashedLine(CFG.LINE_TOTAL_OFFSET)

    const total = subtotal

    row(
      "ยอดรวมทั้งหมด",
      total.toLocaleString("th-TH",{minimumFractionDigits:2}),
      CFG.FONT_TITLE,
      true
    )

    gap(6)
    center("อย่าลืม! สแกนแต้มสะสมบนใบเสร็จทุกครั้ง!", CFG.FONT_SMALL)

    const final = document.createElement("canvas")
    final.width = width
    final.height = y + 20

    const fctx = final.getContext("2d")
    fctx.fillStyle="#fff"
    fctx.fillRect(0,0,final.width,final.height)
    fctx.drawImage(canvas,0,0)

    const dataUrl = final.toDataURL("image/png")

    preview.src = dataUrl
    status.innerText = "Printing..."

    setTimeout(()=>{
      location.href = "rawbt:" + dataUrl
    },400)

  }catch(err){
    status.innerText = "ERROR: " + err.message
  }
}

main()
</script>

</body>
</html>
