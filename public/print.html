<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
}
</style>
</head>

<body>

<h2 id="status">Starting...</h2>

<script>
async function main(){

  try{

    const status = document.getElementById("status")

    // =========================
    // INIT LIFF
    // =========================
    await liff.init({ liffId: "2009308319-yTnMMIYi" })

    // =========================
    // GET ORDER ID
    // =========================
    const params = new URLSearchParams(window.location.search)
    const orderId = params.get("order_id")

    if(!orderId){
      status.innerText = "No order_id"
      return
    }

    status.innerText = "Loading order..."

    // =========================
    // GET ORDER
    // =========================
    const orderRes = await fetch(`/api/get-order?order_id=${orderId}`)
    const order = await orderRes.json()

    if(!order || !order.id){
      status.innerText = "Order not found"
      return
    }

    // =========================
    // MERGE ITEMS
    // =========================
    function mergeItems(items){
      const merged = {}

      items.forEach(i=>{
        const key = i.name + JSON.stringify(i.modifiers || {})
        if(!merged[key]){
          merged[key] = {...i, qty:1}
        }else{
          merged[key].qty++
        }
      })

      return Object.values(merged)
    }

    // =========================
    // FORMAT MODIFIERS
    // =========================
    function formatModifiers(modifiers){

      if(!modifiers) return []

      const result = []

      Object.entries(modifiers).forEach(([group, arr])=>{

        const map = {}

        arr.forEach(m=>{
          const name = typeof m === "object" ? m.name : m
          map[name] = (map[name] || 0) + 1
        })

        Object.entries(map).forEach(([name,count])=>{
          result.push(count > 1 ? `${name} x${count}` : name)
        })

      })

      return result
    }

    const items = mergeItems(order.items || [])

    // =========================
    // BUILD RECEIPT HTML (สำคัญมาก)
    // =========================
    let total = 0

    let html = `
    <div style="font-family: monospace; font-size:20px;">
      <center><b>ร้านน้ำ</b></center>
      <center>DRINK SHOP</center>
      <hr>
      Order #${order.id}<br>
      <hr>
    `

    items.forEach(i=>{

      const lineTotal = i.price * i.qty
      total += lineTotal

      html += `
        ${i.name} x${i.qty}<br>
      `

      const mods = formatModifiers(i.modifiers)

      mods.forEach(m=>{
        html += `&nbsp;&nbsp;+ ${m}<br>`
      })

      html += `
        &nbsp;&nbsp;= ${lineTotal} บาท<br>
        <hr>
      `
    })

    html += `
      <b>รวม ${total} บาท</b><br><br>
      ขอบคุณครับ
    </div>
    `

    console.log("PRINT HTML:", html)

    status.innerText = "Printing..."

    // =========================
    // PRINT VIA RAWBT (HTML MODE)
    // =========================
    window.location.href =
  "rawbt:html," + encodeURIComponent(html)

  }catch(err){
    console.log(err)
    document.getElementById("status").innerText = "ERROR: " + err.message
  }

}

main()
</script>

</body>
</html>
