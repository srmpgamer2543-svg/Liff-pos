<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
}
</style>
</head>

<body>

<h2 id="status">Starting...</h2>

<script>
async function main(){

  try{

    const status = document.getElementById("status")

    // =========================
    // 🔥 FORCE OPEN CHROME
    // =========================
    const params = new URLSearchParams(window.location.search)

    if(params.get("external") === "1"){
      const url = window.location.href.replace("external=1","external=0")
      window.location.href =
        "intent://" + url.replace("https://","") +
        "#Intent;scheme=https;package=com.android.chrome;end;"
      return
    }

    await liff.init({ liffId: "2009308319-yTnMMIYi" })

    const orderId = params.get("order_id")

    if(!orderId){
      status.innerText = "No order_id"
      return
    }

    status.innerText = "Loading order..."

    const orderRes = await fetch(`/api/get-order?order_id=${orderId}`)
    const order = await orderRes.json()

    if(!order || !order.id){
      status.innerText = "Order not found"
      return
    }

    function mergeItems(items){
      const merged = {}

      items.forEach(i=>{
        const key = i.name + JSON.stringify(i.modifiers || {})
        if(!merged[key]){
          merged[key] = {...i, qty:1}
        }else{
          merged[key].qty++
        }
      })

      return Object.values(merged)
    }

    function formatModifiers(modifiers){
      if(!modifiers) return []

      const result = []

      Object.entries(modifiers).forEach(([group, arr])=>{
        const map = {}

        arr.forEach(m=>{
          const name = typeof m === "object" ? m.name : m
          map[name] = (map[name] || 0) + 1
        })

        Object.entries(map).forEach(([name,count])=>{
          result.push(count > 1 ? `${name} x${count}` : name)
        })
      })

      return result
    }

    const items = mergeItems(order.items || [])

    // =========================
    // 🧾 CREATE CANVAS
    // =========================
    const canvas = document.createElement("canvas")
    const ctx = canvas.getContext("2d")

    const width = 384
    let y = 40

    canvas.width = width
    canvas.height = 2000

    ctx.fillStyle = "#fff"
    ctx.fillRect(0,0,canvas.width,canvas.height)

    ctx.fillStyle = "#000"
    ctx.font = "24px monospace"

    function centerText(text){
      const w = ctx.measureText(text).width
      ctx.fillText(text,(width-w)/2,y)
      y += 30
    }

    function leftText(text){
      ctx.fillText(text,10,y)
      y += 28
    }

    function line(){
      ctx.fillText("--------------------------------",10,y)
      y += 28
    }

    // HEADER
    centerText("ร้านน้ำ")
    centerText("DRINK SHOP")
    line()
    leftText("Order #" + order.id)
    line()

    let total = 0

    items.forEach(i=>{

      const lineTotal = i.price * i.qty
      total += lineTotal

      leftText(i.name + " x" + i.qty)

      const mods = formatModifiers(i.modifiers)

      mods.forEach(m=>{
        leftText("  + " + m)
      })

      leftText("  = " + lineTotal + " บาท")
      line()
    })

    ctx.font = "bold 26px monospace"
    leftText("รวม " + total + " บาท")

    y += 20
    ctx.font = "22px monospace"
    centerText("ขอบคุณครับ")

    // =========================
    // ✂️ CROP HEIGHT
    // =========================
    const finalCanvas = document.createElement("canvas")
    finalCanvas.width = width
    finalCanvas.height = y + 20

    const fctx = finalCanvas.getContext("2d")
    fctx.fillStyle = "#fff"
    fctx.fillRect(0,0,finalCanvas.width,finalCanvas.height)
    fctx.drawImage(canvas,0,0)

    // =========================
    // 🔥 PRINT DIRECT RAWBT
    // =========================
    status.innerText = "Printing..."

    const base64 = finalCanvas.toDataURL("image/png").split(",")[1]

    window.location.href =
      "rawbt:base64:image/png;base64," + base64

  }catch(err){
    console.log(err)
    document.getElementById("status").innerText = "ERROR: " + err.message
  }

}

main()
</script>

</body>
</html>
