<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}
img{
  max-width:100%;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h3 id="status">Loading...</h3>
<img id="preview"/>

<script>
async function main(){

  const status = document.getElementById("status")
  const preview = document.getElementById("preview")

  try{

    const params = new URLSearchParams(location.search)

    if(params.get("external")==="1"){
      const url = location.href.replace("external=1","external=0")
      location.href =
        "intent://" + url.replace("https://","") +
        "#Intent;scheme=https;package=com.android.chrome;end;"
      return
    }

    await liff.init({ liffId:"2009308319-yTnMMIYi" })

    const orderId = params.get("order_id")
    if(!orderId){
      status.innerText = "no order_id"
      return
    }

    status.innerText = "Loading order..."

    const res = await fetch(`/api/get-order?order_id=${orderId}`)
    const order = await res.json()

    const canvas = document.createElement("canvas")
    const ctx = canvas.getContext("2d")

    const width = 384
    const LEFT = 12
    const RIGHT = width - 12

    let y = 30

    canvas.width = width
    canvas.height = 2000

    ctx.fillStyle = "#fff"
    ctx.fillRect(0,0,width,2000)
    ctx.fillStyle = "#000"

    function center(text, size=24, bold=false){
      ctx.font = `${bold?"bold ":""}${size}px monospace`
      ctx.textAlign = "center"
      ctx.fillText(text, width/2, y)
      y += size + 10
    }

    function left(text, size=20, bold=false){
      ctx.font = `${bold?"bold ":""}${size}px monospace`
      ctx.textAlign = "left"
      ctx.fillText(text, LEFT, y)
      y += size + 8
    }

    function row(l,r,size=20,bold=false){
      ctx.font = `${bold?"bold ":""}${size}px monospace`

      ctx.textAlign = "left"
      ctx.fillText(l, LEFT, y)

      ctx.textAlign = "right"
      ctx.fillText(r, RIGHT, y)

      y += size + 8
    }

    // ✅ แก้ตรงนี้ (เส้นไม่ทับข้อความ)
    function dashedLine(){
      y -= 20

      ctx.setLineDash([4,2])
      ctx.lineWidth = 1.5

      ctx.beginPath()
      ctx.moveTo(LEFT,y)
      ctx.lineTo(RIGHT,y)
      ctx.stroke()

      ctx.setLineDash([])

      y += 6
    }

    function gap(h=10){ y+=h }

    // ========= HEADER =========
    center("Cafe POS",28,true)
    center("มีนม.ขนมปัง",20,true)
    center("Thank you",16)

    dashedLine()

    const now = new Date()
    const date = now.toLocaleDateString("th-TH")
    const time = now.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})

    left(`วันที่: ${date}`)
    left(`เวลา: ${time}`)
    left(`Order: #${order.id}`)

    dashedLine()

    // ========= ITEMS =========
    let subtotal = 0

    order.items.forEach(i=>{

      subtotal += i.price

      left(i.name,24,true)

      row(` 1 x ${i.price}`, i.price)

      if(i.modifiers){

        const map = {}

        Object.values(i.modifiers).forEach(arr=>{
          arr.forEach(m=>{
            const name = typeof m==="object"?m.name:m
            const price = typeof m==="object"?m.price||0:0

            if(!map[name]){
              map[name] = { count:0, price }
            }
            map[name].count++
          })
        })

        Object.entries(map).forEach(([name,data])=>{
          const qty = data.count > 1 ? ` x${data.count}` : ""
          const priceText = data.price ? `+${data.price * data.count}` : ""

          row(
            "   + " + name + qty,
            priceText,
            18
          )
        })
      }

      gap(4)
    })

    dashedLine()

    const total = subtotal

    ctx.font = "bold 28px monospace"
    row(
      "TOTAL",
      total.toLocaleString("th-TH",{minimumFractionDigits:2}),
      28,
      true
    )

    gap(4)
    center("ขอบคุณที่ใช้บริการ!",18)

    const final = document.createElement("canvas")
    final.width = width
    final.height = y + 20

    const fctx = final.getContext("2d")
    fctx.fillStyle="#fff"
    fctx.fillRect(0,0,final.width,final.height)
    fctx.drawImage(canvas,0,0)

    const dataUrl = final.toDataURL("image/png")

    preview.src = dataUrl
    status.innerText = "Printing..."

    setTimeout(()=>{
      location.href = "rawbt:" + dataUrl
    },400)

  }catch(err){
    status.innerText = "ERROR: " + err.message
  }
}

main()
</script>

</body>
</html>
