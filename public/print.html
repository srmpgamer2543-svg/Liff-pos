<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Print Receipt</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; padding-top:40px;">

<h2>🖨️ กำลังพิมพ์ใบเสร็จ...</h2>
<p id="status">กำลังโหลด...</p>

<script>
async function main(){

  try{

    // 🔧 ใส่ LIFF ID ของคุณตรงนี้
    await liff.init({ liffId: "YOUR_LIFF_ID" })

    document.getElementById("status").innerText = "เชื่อมต่อ LINE แล้ว"

    const params = new URLSearchParams(window.location.search)

    const text = params.get("text")
    const orderId = params.get("orderId")

    if(!text){
      document.getElementById("status").innerText = "❌ ไม่มีข้อมูลสำหรับพิมพ์"
      return
    }

    // 👇 debug แสดงข้อความก่อนพิมพ์
    console.log("PRINT TEXT:", text)

    // 🔥 ยิงเข้า RawBT (พิมพ์จริง)
    window.location.href = "rawbt:print?text=" + encodeURIComponent(text)

    // 👇 แสดง fallback เผื่อไม่เด้ง
    setTimeout(()=>{
      document.getElementById("status").innerHTML =
        "📄 ส่งคำสั่งพิมพ์แล้ว<br><br>" +
        "ถ้าไม่พิมพ์อัตโนมัติ 👉 กรุณากดเปิด RawBT";
    }, 1500)

  }catch(err){

    console.log("ERROR:", err)
    document.getElementById("status").innerText = "❌ เกิดข้อผิดพลาด: " + err.message
  }
}

main()
</script>

</body>
</html>
