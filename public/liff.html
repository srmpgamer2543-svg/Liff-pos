<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: 'Prompt', Arial, sans-serif;
  background: #000;
  margin: 0;
  padding: 18px;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 32px;
  font-weight: 700;
}

#menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

/* CARD */
.card {
  background: #1b1b1b;
  border-radius: 22px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  transition: 0.2s ease;
}

.card:active {
  transform: scale(0.97);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #222;
}

/* CONTENT */
.card-content {
  padding: 16px;
  text-align: center;
}

.name {
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 8px;
}

.price {
  font-size: 19px;
  font-weight: bold;
  color: #ff7a00;
  margin-bottom: 14px;
}

/* CART ICON BUTTON */
.cart-btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: none;
  background: #ff7a00;
  color: white;
  font-size: 30px;
  cursor: pointer;
  transition: 0.2s;
}

.cart-btn:active {
  transform: scale(0.85);
}

/* FLOAT CART BUTTON */
.cart-open-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #ff7a00;
  color: white;
  font-size: 32px;
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* CART MODAL */
#cartModal {
  position: fixed;
  bottom: -100%;
  left: 0;
  right: 0;
  background: white;
  color: black;
  height: 75%;
  border-radius: 30px 30px 0 0;
  padding: 20px;
  overflow-y: auto;
  transition: 0.3s;
}

#cartModal.active {
  bottom: 0;
}

.qty-btn {
  padding: 6px 12px;
  margin: 0 6px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
}

.plus { background: #4CAF50; color: white; }
.minus { background: #f44336; color: white; }

.order-btn {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: #ff7a00;
  color: white;
  border: none;
  border-radius: 25px;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu"></div>

<button class="cart-open-btn" onclick="openCart()">🛍</button>

<div id="cartModal">
  <div id="cartContent"></div>
</div>

<script>

let cart = [];

async function loadProducts() {
  const container = document.getElementById("menu");
  container.innerHTML = "";

  const res = await fetch("https://liff-pos.vercel.app/api/products");
  const data = await res.json();

  data.forEach(item => {

    const box = document.createElement("div");
    box.className = "card";

    const image = item.image 
      ? `<img src="${item.image}" />`
      : `<img src="https://via.placeholder.com/300x200?text=No+Image" />`;

    box.innerHTML = `
      ${image}
      <div class="card-content">
        <div class="name">${item.name}</div>
        <div class="price">${item.price} บาท</div>
        <button class="cart-btn" onclick='addToCart(${JSON.stringify(item)})'>
          🛒
        </button>
      </div>
    `;

    container.appendChild(box);
  });
}

function addToCart(product) {
  const found = cart.find(i => i.id === product.id);
  if (found) {
    found.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  renderCart();
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;

  item.qty += delta;
  if (item.qty <= 0) {
    cart = cart.filter(i => i.id !== id);
  }
  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartContent");

  if (cart.length === 0) {
    container.innerHTML = "<h3>ตะกร้าว่าง</h3>";
    return;
  }

  let total = 0;
  container.innerHTML = "<h3>รายการสินค้า</h3>";

  cart.forEach(item => {
    total += item.price * item.qty;

    container.innerHTML += `
      <div style="display:flex;justify-content:space-between;margin:14px 0;font-size:18px;">
        <div>
          ${item.name}<br>
          <button class="qty-btn minus" onclick="changeQty('${item.id}',-1)">−</button>
          ${item.qty}
          <button class="qty-btn plus" onclick="changeQty('${item.id}',1)">+</button>
        </div>
        <div>${item.price * item.qty} บาท</div>
      </div>
    `;
  });

  container.innerHTML += `
    <hr>
    <h3>รวมทั้งหมด: ${total} บาท</h3>
    <button class="order-btn" onclick="submitOrder()">สั่งซื้อ</button>
  `;
}

function submitOrder() {
  alert("สั่งซื้อสำเร็จ (ตัวอย่าง)");
  cart = [];
  renderCart();
  closeCart();
}

function openCart() {
  document.getElementById("cartModal").classList.add("active");
}

function closeCart() {
  document.getElementById("cartModal").classList.remove("active");
}

document.addEventListener("DOMContentLoaded", loadProducts);

</script>

</body>
</html>
