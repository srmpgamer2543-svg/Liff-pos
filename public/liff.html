<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
background:#06c755;
color:white;
padding:14px;
font-size:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.category{
display:flex;
overflow:auto;
background:white;
padding:10px;
gap:8px;
border-bottom:1px solid #eee;
}

.category button{
border:none;
background:#eee;
padding:6px 14px;
border-radius:20px;
white-space:nowrap;
font-size:14px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
aspect-ratio:3/4;
}

.card-img{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

.add-btn{
position:absolute;
bottom:8px;
right:8px;
background:#06c755;
color:white;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.card-body{
padding:10px;
flex-grow:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.name{
font-size:15px;
font-weight:600;
line-height:1.2;
}

.price{
color:#06c755;
font-weight:bold;
margin-top:6px;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
color:white;
padding:12px 16px;
border-radius:30px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.modal{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
transition:0.3s;
max-height:80%;
overflow:auto;
}

.modal.show{
bottom:0;
}

</style>
</head>

<body>

<div class="header">
<span>Menu</span>
<span onclick="openCart()">🛒</span>
</div>

<div class="category" id="category"></div>

<div class="menu" id="menu"></div>

<div class="cart-btn" onclick="openCart()">
Cart (<span id="cartCount">0</span>)
</div>

<div id="modal" class="modal"></div>

<script>

let products=[]
let cart=[]
let currentProduct=null

function cleanCategory(name){
return name.replace(/^\d+_/, '')
}

function sortCategory(a,b){

let na=parseInt(a.split('_')[0])
let nb=parseInt(b.split('_')[0])

if(isNaN(na)) na=999
if(isNaN(nb)) nb=999

return na-nb

}

async function init(){

await liff.init({liffId:"2009308319-2r1OXrGI"})

let res=await fetch('/api/products')
products=await res.json()

renderCategory()
renderMenu(products)

}

function renderCategory(){

let cats=[...new Set(products.map(p=>p.category))]

cats.sort(sortCategory)

let html='<button onclick="renderMenu(products)">All</button>'

cats.forEach(c=>{
html+=`<button onclick="filterCat('${c}')">${cleanCategory(c)}</button>`
})

document.getElementById('category').innerHTML=html

}

function filterCat(c){
renderMenu(products.filter(p=>p.category==c))
}

function renderMenu(items){

let html=''

items.forEach(p=>{

html+=`

<div class="card">

<div class="card-img" onclick="openProduct('${p.id}')">

<img src="${p.image_url || ''}">

<div class="add-btn" onclick="event.stopPropagation();openProduct('${p.id}')">+</div>

</div>

<div class="card-body">

<div class="name">${p.name}</div>

<div class="price">${p.price} ฿</div>

</div>

</div>

`

})

document.getElementById('menu').innerHTML=html

}

function openProduct(id){

let p=products.find(x=>x.id==id)
currentProduct=p

let html=`<h3>${p.name}</h3>`

p.modifiers.forEach(m=>{

html+=`<h4>${m.name}</h4>`

if(m.name.includes('ท้อปปิ้ง')){

m.options.forEach(o=>{
html+=`
<label>
<input type="checkbox" value="${o.id}">
${o.name}
</label><br>`
})

}else{

m.options.forEach(o=>{
html+=`
<label>
<input type="radio" name="${m.id}" value="${o.id}">
${o.name}
</label><br>`
})

}

})

html+=`<br><button onclick="addCart()">เพิ่มลงตะกร้า</button>`

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

}

function addCart(){

cart.push(currentProduct)

document.getElementById('cartCount').innerText=cart.length

document.getElementById('modal').classList.remove('show')

}

function openCart(){

let html='<h3>Cart</h3>'

cart.forEach(c=>{
html+=`${c.name}<br>`
})

html+='<br><button onclick="sendOrder()">Order</button>'

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

}

async function sendOrder(){

await fetch('/api/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(cart)
})

alert('Order sent')

}

init()

</script>

</body>
</html>
