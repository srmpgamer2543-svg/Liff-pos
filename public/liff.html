<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
font-size:30px;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:999;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* โลโก้ */

.logo-area{
height:22vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
transition:all .35s cubic-bezier(.22,1,.36,1);
}

.logo-area img{
width:100%;
height:100%;
object-fit:contain;
}

/* แถบชื่อร้าน */

.shop-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
border-top:1px solid #eee;
background:#f0fff4;
border:3px solid #06c755;
border-radius:16px;
margin:10px;
}

.shop-title{
font-size:36px;
font-weight:800;
color:#5a2d0c;
}

.cart-icon{
font-size:48px;
cursor:pointer;
transition:transform .2s ease;
}

.cart-icon:active{
transform:scale(.9);
}

/* CATEGORY */

.category{
display:flex;
overflow:auto;
background:white;
padding:12px;
gap:10px;
border-bottom:1px solid #eee;
}

.category button{
border:none;
background:#eee;
padding:12px 20px;
border-radius:20px;
white-space:nowrap;
font-size:30px;
color:black;
font-weight:600;
transition:all .2s;
}

.category button:active{
transform:scale(.95);
}

/* MENU */

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:14px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
aspect-ratio:3/4;
cursor:pointer;
transition:transform .25s ease, box-shadow .25s ease;
}

.card:active{
transform:scale(.96);
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.card-img{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

.add-btn{
position:absolute;
bottom:10px;
right:10px;
background:#06c755;
color:white;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
transition:transform .2s ease;
}

.add-btn:active{
transform:scale(.85);
}

.card-body{
padding:14px;
flex:1;
display:flex;
flex-direction:column;
}

.name{
font-size:45px;
font-weight:700;
line-height:1.35;
flex:1;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.price{
color:#06c755;
font-weight:bold;
font-size:50px;
margin-top:auto;
}

/* FLOATING CART */

.floating-cart{

position:fixed;
bottom:20px;
left:20px;
right:20px;

background:#06c755;
color:white;

padding:20px;
border-radius:30px;

box-shadow:0 6px 20px rgba(0,0,0,0.25);

display:none;

font-size:34px;
font-weight:bold;
text-align:center;

animation:cartPop .35s cubic-bezier(.22,1,.36,1);
}

@keyframes cartPop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:flex-end;
}

.modal.show{
display:flex;
animation:fadeIn .25s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

.modal-content{
background:white;
width:100%;
border-radius:24px 24px 0 0;
padding:28px;
height:50vh;
max-height:50vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
transform:translateY(60px);
animation:slideUp .35s cubic-bezier(.22,1,.36,1) forwards;
}

@keyframes slideUp{
to{transform:translateY(0)}
}

.modifier-group{
margin-bottom:26px;
padding-bottom:20px;
border-bottom:1px solid #eee;
}

.modal-content h3{
font-size:52px;
margin-bottom:24px;
font-weight:700;
}

.modal-content h4{
font-size:42px;
margin-top:10px;
margin-bottom:16px;
font-weight:600;
}

.modifier-grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
}

.option{
display:flex;
align-items:center;
gap:18px;
padding:22px;
border-radius:18px;
background:#fafafa;
font-size:34px;
border:2px solid transparent;
transition:all .2s cubic-bezier(.22,1,.36,1);
position:relative;
}

.option input{
display:none;
}

.option:active{
transform:scale(.97);
}

.option:has(input:checked){
border:2px solid #06c755;
background:#eafff2;
box-shadow:0 3px 10px rgba(6,199,85,.25);
}

.option:has(input:checked)::after{
content:"✓";
position:absolute;
right:20px;
font-size:34px;
color:#06c755;
font-weight:bold;
}

button{
font-size:40px;
padding:24px;
border:none;
background:#06c755;
color:white;
border-radius:16px;
width:100%;
margin-top:30px;
transition:transform .2s ease;
}

button:active{
transform:scale(.96);
}

</style>
</head>

<body>

<div class="header">

<div class="logo-area" id="logoArea">
<img src="logo.png">
</div>

<div class="shop-bar">

<div class="shop-title">
มีนม.ขนมปัง🍞
</div>

<div class="cart-icon" onclick="openCart()">
🧺
</div>

</div>

</div>

<div class="category" id="category"></div>

<div class="menu" id="menu"></div>

<div class="floating-cart" id="floatingCart" onclick="openCart()">
ดูตะกร้า • <span id="floatingTotal">0</span> บาท
</div>

<div id="modal" class="modal"></div>

<script>

/* --- โค้ดระบบทั้งหมดเหมือนเดิม --- */

window.addEventListener("scroll",()=>{

let logo=document.getElementById("logoArea")

if(window.scrollY>80){

logo.style.height="0px"
logo.style.opacity="0"

}else{

logo.style.height="22vh"
logo.style.opacity="1"

}

})

init()

</script>

</body>
</html>
