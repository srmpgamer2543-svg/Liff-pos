<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
font-size:30px;

scroll-behavior:smooth;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:999;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* โลโก้ */

.logo-area{
height:20vh;
display:flex;
align-items:center;
justify-content:center;

transition:height .25s ease, opacity .25s ease;

overflow:hidden;
}

.logo-area img{
width:100%;
height:100%;
object-fit:contain;
padding:10px;
box-sizing:border-box;

transition:transform .55s cubic-bezier(.25,.8,.25,1);
}

/* แถบชื่อร้าน */

.shop-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
border-top:1px solid #eee;
background:#f0fff4;
border:3px solid #06c755;
border-radius:16px;
margin:10px;
}

.shop-title{
font-size:36px;
font-weight:800;
color:#5a2d0c;
}

.cart-icon{
font-size:48px;
cursor:pointer;
transition:transform .2s ease;
}

.cart-icon:active{
transform:scale(.9);
}

/* CATEGORY */

.category{
display:flex;
overflow:auto;
background:white;
padding:12px;
gap:10px;
border-bottom:1px solid #eee;
}

.category button{
border:none;
background:#eee;
padding:12px 20px;
border-radius:20px;
white-space:nowrap;
font-size:30px;
color:black;
font-weight:600;
transition:all .2s;
}

.category button:active{
transform:scale(.95);
}

/* MENU */

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:14px;

scroll-snap-align:start;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
aspect-ratio:3/4;
cursor:pointer;
transition:transform .25s ease, box-shadow .25s ease;
}

.card:active{
transform:scale(.96);
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.card-img{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

.add-btn{
position:absolute;
bottom:10px;
right:10px;
background:#06c755;
color:white;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
transition:transform .2s ease;
}

.add-btn:active{
transform:scale(.85);
}

.card-body{
padding:14px;
flex:1;
display:flex;
flex-direction:column;
}

.name{
font-size:45px;
font-weight:700;
line-height:1.35;
flex:1;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.price{
color:#06c755;
font-weight:bold;
font-size:50px;
margin-top:auto;
}

/* FLOATING CART */

.floating-cart{

position:fixed;
bottom:20px;
left:20px;
right:20px;

background:#06c755;
color:white;

padding:20px;
border-radius:30px;

box-shadow:0 6px 20px rgba(0,0,0,0.25);

display:none;

font-size:34px;
font-weight:bold;
text-align:center;

animation:cartPop .35s cubic-bezier(.22,1,.36,1);
}

@keyframes cartPop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:flex-end;
}

.modal.show{
display:flex;
animation:fadeIn .25s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

.modal-content{
background:white;
width:100%;
border-radius:24px 24px 0 0;
padding:28px;
height:50vh;
max-height:50vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
transform:translateY(60px);
animation:slideUp .35s cubic-bezier(.22,1,.36,1) forwards;
}

@keyframes slideUp{
to{transform:translateY(0)}
}

.modifier-group{
margin-bottom:26px;
padding-bottom:20px;
border-bottom:1px solid #eee;
}

.modal-content h3{
font-size:52px;
margin-bottom:24px;
font-weight:700;
}

.modal-content h4{
font-size:42px;
margin-top:10px;
margin-bottom:16px;
font-weight:600;
}

.modifier-grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
}

/* OPTION STYLE ใหม่ */

.option{
display:flex;
align-items:center;
gap:18px;
padding:22px;
border-radius:18px;
background:#fafafa;
font-size:34px;
border:2px solid transparent;
transition:all .2s cubic-bezier(.22,1,.36,1);
position:relative;
}

.option input{
display:none;
}

.option:active{
transform:scale(.97);
}

.option:has(input:checked){
border:2px solid #06c755;
background:#eafff2;
box-shadow:0 3px 10px rgba(6,199,85,.25);
}

.option:has(input:checked)::after{
content:"✓";
position:absolute;
right:20px;
font-size:34px;
color:#06c755;
font-weight:bold;
}

button{
font-size:40px;
padding:24px;
border:none;
background:#06c755;
color:white;
border-radius:16px;
width:100%;
margin-top:30px;
transition:transform .2s ease;
}

button:active{
transform:scale(.96);
}

</style>
</head>

<body>

<div class="header">

<div class="logo-area" id="logoArea">
<img src="logo.png">
</div>

<div class="shop-bar">

<div class="shop-title">
มีนม.ขนมปัง🍞
</div>

<div class="cart-icon" onclick="openCart()">
🧺
</div>

</div>

</div>

<div class="category" id="category"></div>

<div class="menu" id="menu"></div>

<div class="floating-cart" id="floatingCart" onclick="openCart()">
ดูตะกร้า • <span id="floatingTotal">0</span> บาท
</div>

<div id="modal" class="modal"></div>

<script>

let products=[]
let cart=[]
let currentProduct=null

function cleanCategory(name){
if(!name) return "อื่นๆ"
return name.replace(/^\d+_/,'')
}

function sortCategory(a,b){

if(!a) a="999_อื่นๆ"
if(!b) b="999_อื่นๆ"

let na=parseInt(a.split('_')[0])
let nb=parseInt(b.split('_')[0])

if(isNaN(na)) na=999
if(isNaN(nb)) nb=999

return na-nb
}

function sortProducts(list){
return list.sort((a,b)=>{

let ca = a.category ? parseInt(a.category.split('_')[0]) : 999
let cb = b.category ? parseInt(b.category.split('_')[0]) : 999

if(isNaN(ca)) ca=999
if(isNaN(cb)) cb=999

if(ca!==cb) return ca-cb
return (a.name || "").localeCompare(b.name || "")

})
}

function sortModifiers(mods){

return mods.sort((a,b)=>{

let order = ["เย็น","ปั่น","หวาน","ท้อปปิ้ง"]

let ai = order.findIndex(o=>a.name.includes(o))
let bi = order.findIndex(o=>b.name.includes(o))

if(ai==-1) ai=99
if(bi==-1) bi=99

return ai-bi

})

}

async function init(){

try{

await liff.init({liffId:"2009308319-2r1OXrGI"})

let res=await fetch('/api/products')
products=await res.json()

products=products.map(p=>{
if(!p.category) p.category="999_อื่นๆ"
return p
})

products=sortProducts(products)

renderCategory()
renderMenu(products)

}catch(e){

console.error(e)
alert("โหลดเมนูไม่สำเร็จ")

}

}

function renderCategory(){

let cats=[...new Set(products.map(p=>p.category).filter(Boolean))]
cats.sort(sortCategory)

let html='<button onclick="renderMenu(products)">All</button>'

cats.forEach(c=>{
html+=`<button onclick="filterCat('${c}')">${cleanCategory(c)}</button>`
})

document.getElementById('category').innerHTML=html

}

function filterCat(c){
let list=products.filter(p=>p.category==c)
renderMenu(sortProducts(list))
}

function renderMenu(items){

let html=''

items.forEach(p=>{

html+=`

<div class="card" onclick="openProduct('${p.id}')">

<div class="card-img">
<img src="${p.image_url || ''}">
<div class="add-btn">+</div>
</div>

<div class="card-body">
<div class="name">${p.name}</div>
<div class="price">${p.price} ฿</div>
</div>

</div>

`

})

document.getElementById('menu').innerHTML=html

}

function openProduct(id){

let p=products.find(x=>x.id==id)
currentProduct=p

let mods=sortModifiers([...p.modifiers])

let html=`<div class="modal-content" onclick="event.stopPropagation()">`

html+=`<h3>${p.name}</h3>`

mods.forEach(m=>{

html+=`<div class="modifier-group">`
html+=`<h4>${m.name}</h4>`
html+=`<div class="modifier-grid">`

if(m.name.includes('ท้อปปิ้ง')){

m.options.forEach(o=>{
html+=`
<label class="option">
<input type="checkbox" value="${o.id}">
${o.name}
</label>`
})

}else{

m.options.forEach(o=>{
html+=`
<label class="option">
<input type="radio" name="${m.id}" value="${o.id}">
${o.name}
</label>`
})

}

html+=`</div>`
html+=`</div>`

})

html+=`<button onclick="addCart()">เพิ่มลงตะกร้า</button>`
html+=`</div>`

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

modal.onclick=function(){
modal.classList.remove('show')
}

}

function validateRequired(){

let needIce=false
let needSweet=false

let iceSelected=false
let sweetSelected=false

document.querySelectorAll(".modifier-group").forEach(group=>{

let name = group.querySelector("h4").innerText

let radios = group.querySelectorAll("input[type=radio]")

let checked=false
radios.forEach(i=>{
if(i.checked) checked=true
})

if(name.includes("เย็น") || name.includes("ปั่น")){
needIce=true
if(checked) iceSelected=true
}

if(name.includes("หวาน")){
needSweet=true
if(checked) sweetSelected=true
}

})

if(needIce && !iceSelected){
alert("กรุณาเลือก เย็น หรือ ปั่น")
return false
}

if(needSweet && !sweetSelected){
alert("กรุณาเลือกระดับความหวาน")
return false
}

return true
}

function addCart(){

if(!validateRequired()) return

cart.push(currentProduct)

let total=0
cart.forEach(i=> total+=i.price)

document.getElementById('floatingTotal').innerText=total
document.getElementById('floatingCart').style.display="block"

document.getElementById('modal').classList.remove('show')

}

function openCart(){

let html=`<div class="modal-content" onclick="event.stopPropagation()">`

html+='<h3>Cart</h3>'

cart.forEach(c=>{
html+=`${c.name}<br>`
})

html+='<button onclick="sendOrder()">Order</button>'
html+='</div>'

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

modal.onclick=function(){
modal.classList.remove('show')
}

}

async function sendOrder(){

await fetch('/api/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(cart)
})

alert('Order sent')

}

const logo = document.getElementById("logoArea")

window.addEventListener("scroll",()=>{

let y = window.scrollY
let max = 120

if(y <= max){

let progress = Math.min(y / max,1)

logo.style.height = (20 - progress*20) + "vh"
logo.style.opacity = 1 - progress

}

if(y > max){

logo.style.height = "0vh"
logo.style.opacity = "0"

}

})

init()

</script>

</body>
</html>
