<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* 🔥 ตารางสินค้า */
#menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* การ์ดสินค้า */
.card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  text-align: center;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

.card h3 {
  font-size: 14px;
  margin: 0 0 6px;
}

.price {
  font-size: 14px;
  font-weight: bold;
  color: #ff6a00;
  margin-bottom: 8px;
}

button {
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #ff6a00;
  color: white;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  background: #e65c00;
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<script>
async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("https://liff-pos.vercel.app/api/products");
    const data = await res.json();

    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = "ไม่มีข้อมูลสินค้า";
      return;
    }

    data.forEach(item => {

      const box = document.createElement("div");
      box.className = "card";

      const price = Number(item.price || 0);

      box.innerHTML = `
        <h3>${item.name}</h3>
        <div class="price">${price} บาท</div>
        <button onclick="alert('เพิ่มแล้ว')">
          เพิ่ม
        </button>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "โหลดสินค้าไม่สำเร็จ";
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
