<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  margin: 0;
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 34px; /* ใหญ่ขึ้น */
  font-weight: bold;
}

/* 3 คอลัมน์ */
#menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* การ์ด */
.card {
  background: white;
  border-radius: 22px;
  box-shadow: 0 10px 22px rgba(0,0,0,0.7);
  position: relative;
  min-height: 240px; /* สูงขึ้น */
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

/* แถบเขียว */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  background: linear-gradient(90deg, #1b5e20, #43a047);
}

/* ปุ่มตะกร้าใหญ่ 3 เท่า */
.cart-btn {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 90px;   /* ใหญ่ขึ้น */
  height: 90px;  /* ใหญ่ขึ้น */
  border-radius: 50%;
  border: none;
  background: #ff6a00;
  color: white;
  font-size: 42px; /* ไอคอนใหญ่ */
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.cart-btn:active {
  transform: scale(0.92);
  background: #e65c00;
}

/* ราคา */
.price {
  font-size: 34px; /* ใหญ่สุด */
  font-weight: bold;
  color: #ff6a00;
  align-self: flex-end;
}

/* ชื่อเมนู */
.name {
  font-size: 26px; /* ใหญ่ขึ้น */
  font-weight: bold;
  color: #222;
  margin-top: 8px;
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<script>
async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("https://liff-pos.vercel.app/api/products");
    const data = await res.json();

    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = "<span style='color:white;font-size:24px'>ไม่มีข้อมูลสินค้า</span>";
      return;
    }

    data.forEach(item => {

      const box = document.createElement("div");
      box.className = "card";

      const price = Number(item.price || 0);

      box.innerHTML = `
        <button class="cart-btn" onclick="alert('เพิ่มแล้ว')">🛒</button>
        <div class="price">${price} บาท</div>
        <div class="name">${item.name}</div>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "<span style='color:white;font-size:24px'>โหลดสินค้าไม่สำเร็จ</span>";
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
