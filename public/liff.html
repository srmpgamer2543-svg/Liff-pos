<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111; /* 🔥 พื้นหลังดำ */
  margin: 0;
  padding: 20px;
  color: white;
}

/* หัวข้อ */
h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* 3 คอลัมน์ */
#menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* การ์ด */
.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 18px rgba(0,0,0,0.6); /* 🔥 ลอยบนพื้นดำ */
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 190px;
  transition: 0.25s ease;
}

.card:hover {
  transform: translateY(-6px);
}

/* แถบเขียว */
.card-top {
  height: 10px;
  background: linear-gradient(90deg, #1b5e20, #43a047);
}

/* เนื้อหา */
.card-content {
  padding: 16px;
  text-align: center;
  flex-grow: 1;
  color: #222;
}

.card h3 {
  font-size: 20px; /* 🔥 ใหญ่ขึ้น */
  margin: 10px 0;
  font-weight: bold;
}

.price {
  font-size: 22px; /* 🔥 ใหญ่ขึ้น */
  font-weight: bold;
  color: #ff6a00;
  margin: 10px 0;
}

/* ปุ่ม */
button {
  margin: 14px;
  padding: 12px 0;
  border: none;
  border-radius: 12px;
  background: #ff6a00;
  color: white;
  font-size: 16px; /* 🔥 ใหญ่ขึ้น */
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.96);
  background: #e65c00;
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<script>
async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("https://liff-pos.vercel.app/api/products");
    const data = await res.json();

    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = "<span style='color:white'>ไม่มีข้อมูลสินค้า</span>";
      return;
    }

    data.forEach(item => {

      const box = document.createElement("div");
      box.className = "card";

      const price = Number(item.price || 0);

      box.innerHTML = `
        <div class="card-top"></div>
        <div class="card-content">
          <h3>${item.name}</h3>
          <div class="price">${price} บาท</div>
        </div>
        <button onclick="alert('เพิ่มแล้ว')">เพิ่ม</button>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "<span style='color:white'>โหลดสินค้าไม่สำเร็จ</span>";
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
