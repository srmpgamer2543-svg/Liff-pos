<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  margin: 0;
  padding: 20px;
  color: white;
}

/* หัวข้อใหญ่ขึ้น */
h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 36px;
}

/* เมนู */
#menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

.card {
  background: white;
  border-radius: 22px;
  position: relative;
  min-height: 200px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.cart-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  background: #ff6a00;
  color: white;
  font-size: 34px;
  cursor: pointer;
}

.price {
  font-size: 28px;
  font-weight: bold;
  color: #ff6a00;
  text-align: right;
}

.name {
  font-size: 22px;
  font-weight: bold;
  color: #222;
}

/* ปุ่มเปิดตะกร้า */
.cart-open-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #ff6a00;
  color: white;
  font-size: 38px;
  border: none;
  cursor: pointer;
  z-index: 1000;
}

/* พื้นหลังมืด */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
}

/* ตะกร้า */
#cartModal {
  position: fixed;
  bottom: -100%;
  left: 0;
  right: 0;
  background: white;
  color: black;
  height: 75%;
  border-radius: 30px 30px 0 0;
  padding: 20px;
  transition: 0.3s;
  overflow-y: auto;
}

#cartModal.active {
  bottom: 0;
}

.drag-bar {
  width: 60px;
  height: 6px;
  background: #ccc;
  margin: 0 auto 15px;
  border-radius: 6px;
}

/* รายการ */
.item-row {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
  font-size: 22px;
}

.qty-btn {
  padding: 6px 14px;
  font-size: 20px;
  margin: 0 6px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.plus { background: #4CAF50; color: white; }
.minus { background: #f44336; color: white; }

.total {
  font-size: 26px;
  font-weight: bold;
  margin-top: 20px;
}

.order-btn {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: #ff6a00;
  color: white;
  border: none;
  border-radius: 25px;
  font-size: 22px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu"></div>

<button class="cart-open-btn" onclick="openCart()">🛍</button>

<div id="overlay" onclick="closeCart()"></div>

<div id="cartModal">
  <div class="drag-bar"></div>
  <div id="cartContent"></div>
</div>

<script>

let cart = [];
let startY = 0;
let currentY = 0;

async function loadProducts() {
  const container = document.getElementById("menu");
  const res = await fetch("https://liff-pos.vercel.app/api/products");
  const data = await res.json();

  data.forEach(item => {
    const box = document.createElement("div");
    box.className = "card";

    box.innerHTML = `
      <button class="cart-btn">🛒</button>
      <div class="price">${item.price} บาท</div>
      <div class="name">${item.name}</div>
    `;

    box.querySelector(".cart-btn").onclick = () => addToCart(item);
    container.appendChild(box);
  });
}

function addToCart(product) {
  const found = cart.find(i => i.id === product.id);
  if (found) found.qty++;
  else cart.push({ ...product, qty: 1 });

  renderCart();
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;

  item.qty += delta;
  if (item.qty <= 0)
    cart = cart.filter(i => i.id !== id);

  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartContent");

  if (cart.length === 0) {
    container.innerHTML = "<h3>ตะกร้าว่าง</h3>";
    return;
  }

  let total = 0;
  container.innerHTML = "<h3>รายการสินค้า</h3>";

  cart.forEach(item => {
    total += item.price * item.qty;

    container.innerHTML += `
      <div class="item-row">
        <div>
          ${item.name}<br>
          <button class="qty-btn minus" onclick="changeQty(${item.id},-1)">−</button>
          ${item.qty}
          <button class="qty-btn plus" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <div>${item.price * item.qty} บาท</div>
      </div>
    `;
  });

  container.innerHTML += `
    <div class="total">รวมทั้งหมด: ${total} บาท</div>
    <button class="order-btn" onclick="submitOrder()">สั่งซื้อ</button>
  `;
}

function submitOrder() {
  alert("สั่งซื้อสำเร็จ (ตัวอย่าง)");
  cart = [];
  renderCart();
  closeCart();
}

function openCart() {
  document.getElementById("cartModal").classList.add("active");
  document.getElementById("overlay").style.display = "block";
}

function closeCart() {
  document.getElementById("cartModal").classList.remove("active");
  document.getElementById("overlay").style.display = "none";
}

/* ลากลงปิดได้ */
const modal = document.getElementById("cartModal");

modal.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

modal.addEventListener("touchmove", e => {
  currentY = e.touches[0].clientY;
  if (currentY - startY > 100) {
    closeCart();
  }
});

document.addEventListener("DOMContentLoaded", loadProducts);

</script>

</body>
</html>
