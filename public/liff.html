<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  margin: 0;
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 28px;
}

#menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: white;
  border-radius: 20px;
  position: relative;
  min-height: 200px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.cart-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  background: #ff6a00;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

.price {
  font-size: 22px;
  font-weight: bold;
  color: #ff6a00;
  text-align: right;
}

.name {
  font-size: 18px;
  font-weight: bold;
  color: #222;
}

.cart-open-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #ff6a00;
  color: white;
  font-size: 32px;
  border: none;
  cursor: pointer;
}

#cartModal {
  position: fixed;
  bottom: -100%;
  left: 0;
  right: 0;
  background: white;
  color: black;
  height: 70%;
  border-radius: 25px 25px 0 0;
  padding: 20px;
  overflow-y: auto;
  transition: 0.3s;
}

#cartModal.active {
  bottom: 0;
}

.drag-bar {
  width: 50px;
  height: 5px;
  background: #ccc;
  margin: 0 auto 10px;
  border-radius: 5px;
}

.qty-btn {
  padding: 4px 10px;
  font-size: 16px;
  margin: 0 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.plus { background: #4CAF50; color: white; }
.minus { background: #f44336; color: white; }

.order-btn {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #ff6a00;
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu"></div>

<button class="cart-open-btn" onclick="openCart()">🛍</button>

<div id="cartModal">
  <div class="drag-bar" onclick="closeCart()"></div>
  <div id="cartContent"></div>
</div>

<script>

let cart = [];

async function loadProducts() {
  const container = document.getElementById("menu");
  const res = await fetch("https://liff-pos.vercel.app/api/products");
  const data = await res.json();

  data.forEach(item => {
    const box = document.createElement("div");
    box.className = "card";

    const btn = document.createElement("button");
    btn.className = "cart-btn";
    btn.textContent = "🛒";
    btn.onclick = () => addToCart(item);

    box.innerHTML = `
      <div class="price">${item.price} บาท</div>
      <div class="name">${item.name}</div>
    `;

    box.appendChild(btn);
    container.appendChild(box);
  });
}

function addToCart(product) {
  const found = cart.find(i => i.id === product.id);
  if (found) {
    found.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  renderCart();
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;

  item.qty += delta;
  if (item.qty <= 0) {
    cart = cart.filter(i => i.id !== id);
  }
  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartContent");

  if (cart.length === 0) {
    container.innerHTML = "<h3>ตะกร้าว่าง</h3>";
    return;
  }

  let total = 0;
  container.innerHTML = "<h3>รายการสินค้า</h3>";

  cart.forEach(item => {
    total += item.price * item.qty;

    container.innerHTML += `
      <div style="display:flex;justify-content:space-between;margin:10px 0;">
        <div>
          ${item.name}<br>
          <button class="qty-btn minus" onclick="changeQty(${item.id},-1)">-</button>
          ${item.qty}
          <button class="qty-btn plus" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <div>${item.price * item.qty} บาท</div>
      </div>
    `;
  });

  container.innerHTML += `
    <hr>
    <h3>รวมทั้งหมด: ${total} บาท</h3>
    <button class="order-btn" onclick="submitOrder()">สั่งซื้อ</button>
  `;
}

function submitOrder() {
  alert("สั่งซื้อสำเร็จ (ตัวอย่าง)");
  cart = [];
  renderCart();
  closeCart();
}

function openCart() {
  document.getElementById("cartModal").classList.add("active");
}

function closeCart() {
  document.getElementById("cartModal").classList.remove("active");
}

document.addEventListener("DOMContentLoaded", loadProducts);

</script>

</body>
</html>
