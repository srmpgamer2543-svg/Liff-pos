<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  margin: 0;
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 26px;
  font-weight: bold;
}

/* 3 คอลัมน์ */
#menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* การ์ด */
.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 18px rgba(0,0,0,0.6);
  position: relative;
  min-height: 200px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
}

/* แถบเขียว */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 10px;
  background: linear-gradient(90deg, #1b5e20, #43a047);
}

/* ปุ่มตะกร้ามุมขวาบน */
.cart-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: #ff6a00;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: 0.2s;
}

.cart-btn:active {
  transform: scale(0.9);
  background: #e65c00;
}

/* ชื่อเมนู */
.name {
  font-size: 20px;
  font-weight: bold;
  color: #222;
  margin-top: 6px;
}

/* ราคา */
.price {
  font-size: 26px;  /* ใหญ่กว่าชื่อ */
  font-weight: bold;
  color: #ff6a00;
  align-self: flex-end; /* ชิดขวา */
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<script>
async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("https://liff-pos.vercel.app/api/products");
    const data = await res.json();

    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = "<span style='color:white'>ไม่มีข้อมูลสินค้า</span>";
      return;
    }

    data.forEach(item => {

      const box = document.createElement("div");
      box.className = "card";

      const price = Number(item.price || 0);

      box.innerHTML = `
        <button class="cart-btn" onclick="alert('เพิ่มแล้ว')">🛒</button>
        <div class="price">${price} บาท</div>
        <div class="name">${item.name}</div>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "<span style='color:white'>โหลดสินค้าไม่สำเร็จ</span>";
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
