<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LIFF POS</title>
</head>
<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<script>
async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("/api/products");
    const data = await res.json();

    container.innerHTML = "";

    if (!data.items) {
      container.innerHTML = "ไม่มีข้อมูลสินค้า";
      return;
    }

    data.items.forEach(item => {
      let price = 0;

      if (item.variants && item.variants.length > 0) {
        price = item.variants[0].price;

      const box = document.createElement("div");
      box.style.border = "1px solid orange";
      box.style.margin = "10px";
      box.style.padding = "10px";
      box.style.borderRadius = "8px";

      box.innerHTML = `
        <h3>${item.item_name}</h3>
        <p>ราคา: ${price} บาท</p>
        <button onclick="alert('เพิ่มแล้ว')">เพิ่มลงตะกร้า</button>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "โหลดสินค้าไม่สำเร็จ";
    console.error(err);
  }
}

loadProducts();
</script>

</body>
</html>
