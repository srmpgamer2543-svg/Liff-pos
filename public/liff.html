<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Menu</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
}

.logo{
text-align:center;
padding:20px;
}

.logo img{
width:180px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
}

.add{
position:absolute;
right:10px;
bottom:10px;
background:#16a34a;
color:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.modal{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-radius:20px 20px 0 0;
max-height:70vh;
overflow:auto;
display:none;
padding:20px;
}

.modal.show{
display:block;
}

</style>

</head>

<body>

<div class="logo">
<img src="/logo.png">
</div>

<div id="menu" class="menu-grid"></div>

<div id="modal" class="modal"></div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
