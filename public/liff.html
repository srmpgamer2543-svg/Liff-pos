<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>
</head>
<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<script>
async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("https://liff-pos.vercel.app/api/products");
    const data = await res.json();

    container.innerHTML = "";

    // เพราะ API ส่ง array ตรง ๆ
    if (!data || data.length === 0) {
      container.innerHTML = "ไม่มีข้อมูลสินค้า";
      return;
    }

    data.forEach(item => {

      const box = document.createElement("div");
      box.style.border = "1px solid orange";
      box.style.margin = "10px";
      box.style.padding = "10px";
      box.style.borderRadius = "8px";

      const price = Number(item.price || 0);

      box.innerHTML = `
        <h3>${item.name}</h3>
        <p>${price} บาท</p>
        <button onclick="alert('เพิ่มแล้ว')">เพิ่มลงตะกร้า</button>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "โหลดสินค้าไม่สำเร็จ";
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
