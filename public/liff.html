<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

.logo{
text-align:center;
padding:20px;
}

.logo img{
width:180px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:#16a34a;
font-weight:bold;
}

</style>

</head>

<body>

<div class="logo">
<img src="/logo.png">
</div>

<div id="menu" class="menu-grid"></div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
