<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
padding:16px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.categories{
display:flex;
overflow-x:auto;
gap:8px;
padding:10px;
background:white;
border-bottom:1px solid #eee;
}

.cat{
padding:6px 14px;
background:#eee;
border-radius:20px;
white-space:nowrap;
font-size:14px;
cursor:pointer;
}

.cat.active{
background:#ff6f00;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
background:#eee;
}

.card-body{
padding:10px;
}

.name{
font-weight:bold;
font-size:15px;
}

.price{
font-size:13px;
color:#666;
margin-top:4px;
}

.cart-btn{
position:fixed;
right:16px;
bottom:16px;
background:#ff6f00;
color:white;
border:none;
border-radius:50px;
padding:14px 18px;
font-size:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.modal{
position:fixed;
left:0;
right:0;
top:0;
bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
border-radius:12px;
padding:20px;
width:90%;
max-height:80%;
overflow:auto;
}

.option{
margin:6px 0;
}

</style>
</head>

<body>

<div class="header">เมนูร้าน</div>

<div id="categories" class="categories"></div>

<div id="grid" class="grid"></div>

<button class="cart-btn" onclick="openCart()">ตะกร้า (0)</button>

<div id="modal" class="modal">
<div class="modal-content" id="modal-content"></div>
</div>

<script>

let products=[]
let cart=[]
let currentCategory="ทั้งหมด"

async function init(){

await liff.init({ liffId:"2009308319-2r1OXrGI" })

const res=await fetch("/api/products")
products=await res.json()

preparePrice()

renderCategories()

renderProducts()

}

function preparePrice(){

products.forEach(p=>{
if(!p.price){
p.price=p.variants?.[0]?.price||0
}
})

}

function getCategories(){

let cats=[...new Set(products.map(p=>p.category))]

cats.sort((a,b)=>{
const na=parseInt(a.split("_")[0])
const nb=parseInt(b.split("_")[0])
return na-nb
})

return cats

}

function renderCategories(){

const el=document.getElementById("categories")

el.innerHTML=""

const all=document.createElement("div")
all.className="cat active"
all.innerText="ทั้งหมด"
all.onclick=()=>{
currentCategory="ทั้งหมด"
updateCategoryUI()
renderProducts()
}
el.appendChild(all)

getCategories().forEach(cat=>{

const name=cat.split("_")[1]||cat

const d=document.createElement("div")
d.className="cat"
d.innerText=name

d.onclick=()=>{
currentCategory=cat
updateCategoryUI()
renderProducts()
}

el.appendChild(d)

})

}

function updateCategoryUI(){

document.querySelectorAll(".cat").forEach(c=>{
c.classList.remove("active")
})

const cats=document.querySelectorAll(".cat")

cats.forEach(c=>{
if(c.innerText==="ทั้งหมด" && currentCategory==="ทั้งหมด"){
c.classList.add("active")
}

if(c.innerText===currentCategory.split("_")[1]){
c.classList.add("active")
}

})

}

function renderProducts(){

const grid=document.getElementById("grid")

grid.innerHTML=""

let list=products

if(currentCategory!=="ทั้งหมด"){
list=products.filter(p=>p.category===currentCategory)
}

list.forEach(p=>{

const card=document.createElement("div")
card.className="card"

card.onclick=()=>openProduct(p)

card.innerHTML=`

<img src="${p.image_url||''}">

<div class="card-body">

<div class="name">${p.name}</div>

<div class="price">฿ ${p.price}</div>

</div>
`

grid.appendChild(card)

})

}

function openProduct(p){

const modal=document.getElementById("modal")
const content=document.getElementById("modal-content")

let html=`<h3>${p.name}</h3>`

if(p.modifiers){

p.modifiers.forEach(group=>{

html+=`<h4>${group.name}</h4>`

group.options.forEach(opt=>{

const isTopping=group.name.includes("ท้อป")

if(isTopping){

html+=`
<div class="option">
<label>
<input type="checkbox" value="${opt.id}">
${opt.name} (+${opt.price})
</label>
</div>
`

}else{

html+=`
<div class="option">
<label>
<input type="radio" name="${group.id}" value="${opt.id}">
${opt.name} (+${opt.price})
</label>
</div>
`

}

})

})

}

html+=`<br><button onclick="addToCart('${p.variant_id}')">เพิ่มลงตะกร้า</button>`

content.innerHTML=html

modal.style.display="flex"

}

function addToCart(variant){

cart.push({variant})

updateCart()

closeModal()

}

function updateCart(){

document.querySelector(".cart-btn").innerText=`ตะกร้า (${cart.length})`

}

function openCart(){

alert("Cart items: "+cart.length)

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

document.getElementById("modal").onclick=(e)=>{
if(e.target.id==="modal"){
closeModal()
}
}

init()

</script>

</body>
</html>
