<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  margin: 0;
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 34px;
  font-weight: bold;
}

#menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: white;
  border-radius: 22px;
  box-shadow: 0 10px 22px rgba(0,0,0,0.7);
  position: relative;
  min-height: 240px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  background: linear-gradient(90deg, #1b5e20, #43a047);
}

/* ปุ่มสินค้า */
.cart-btn {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: none;
  background: #ff6a00;
  color: white;
  font-size: 42px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  transition: 0.15s;
}

.cart-btn:active {
  transform: scale(0.85);
}

/* ราคา */
.price {
  font-size: 34px;
  font-weight: bold;
  color: #ff6a00;
  align-self: flex-end;
}

.name {
  font-size: 26px;
  font-weight: bold;
  color: #222;
  margin-top: 8px;
}

/* ปุ่มเปิดตะกร้าใหญ่ */
.cart-open-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: #ff6a00;
  color: white;
  font-size: 48px;
  border: none;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* badge */
.cart-count {
  position: absolute;
  top: -6px;
  right: -6px;
  background: red;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 20px;
  font-weight: bold;
  display: none;
  align-items: center;
  justify-content: center;
  animation: bounce 0.3s ease;
}

@keyframes bounce {
  0% { transform: scale(0.5); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* modal */
#cartModal {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  color: black;
  padding: 30px;
  height: 80%;
  overflow-y: auto;
  border-radius: 30px 30px 0 0;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

/* check animation */
.checkmark {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 28px;
  color: #00c853;
  animation: pop 0.6s ease forwards;
}

@keyframes pop {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1); }
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<button class="cart-open-btn" onclick="toggleCart()">
  🛍
  <div id="cartCount" class="cart-count">0</div>
</button>

<div id="cartModal"></div>

<script>

let cart = [];

async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("https://liff-pos.vercel.app/api/products");
    const data = await res.json();

    container.innerHTML = "";

    data.forEach(item => {
      const box = document.createElement("div");
      box.className = "card";

      const price = Number(item.price || 0);

      box.innerHTML = `
        <button class="cart-btn"
        onclick="handleAdd(this, ${JSON.stringify({
          id: item.id,
          name: item.name,
          price: price
        })})">🛒</button>

        <div class="price">${price} บาท</div>
        <div class="name">${item.name}</div>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "โหลดสินค้าไม่สำเร็จ";
  }
}

function handleAdd(button, product) {
  addToCart(product);

  const check = document.createElement("div");
  check.className = "checkmark";
  check.innerHTML = "✓";
  button.parentElement.appendChild(check);

  setTimeout(() => check.remove(), 600);
}

function addToCart(product) {
  const existing = cart.find(item => item.id === product.id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  updateCartCount();
  renderCart();
}

function updateCartCount() {
  const badge = document.getElementById("cartCount");
  const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);

  if (totalQty > 0) {
    badge.style.display = "flex";
    badge.innerText = totalQty;
    badge.style.animation = "none";
    void badge.offsetWidth;
    badge.style.animation = "bounce 0.3s ease";
  } else {
    badge.style.display = "none";
  }
}

function toggleCart() {
  const modal = document.getElementById("cartModal");
  modal.style.display = modal.style.display === "none" ? "block" : "none";
  renderCart();
}

function renderCart() {
  const modal = document.getElementById("cartModal");

  if (cart.length === 0) {
    modal.innerHTML = "<h3>ตะกร้าว่าง</h3>";
    return;
  }

  let total = 0;
  modal.innerHTML = "<h2>รายการสินค้า</h2>";

  cart.forEach(item => {
    total += item.price * item.qty;

    modal.innerHTML += `
      <div style="display:flex;justify-content:space-between;margin:12px 0;font-size:20px;">
        <span>${item.name} x${item.qty}</span>
        <span>${item.price * item.qty} บาท</span>
      </div>
    `;
  });

  modal.innerHTML += `
    <hr>
    <h2>รวมทั้งหมด: ${total} บาท</h2>
    <button onclick="clearCart()"
    style="padding:14px 24px;background:red;color:white;
    border:none;border-radius:30px;font-size:20px;">
    ล้างตะกร้า
    </button>
  `;
}

function clearCart() {
  cart = [];
  updateCartCount();
  renderCart();
}

document.addEventListener("DOMContentLoaded", loadProducts);

</script>

</body>
</html>
