<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f7f7f7;
}

#categories{
display:flex;
overflow-x:auto;
background:white;
border-bottom:1px solid #ddd;
}

.category{
padding:12px 16px;
white-space:nowrap;
cursor:pointer;
font-weight:bold;
}

.category.active{
color:#06c755;
border-bottom:3px solid #06c755;
}

#menu{
padding:10px;
}

.card{
display:flex;
background:white;
border-radius:10px;
margin-bottom:10px;
padding:10px;
align-items:center;
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
margin-right:10px;
}

.info{
flex:1;
}

.name{
font-size:16px;
font-weight:bold;
}

.price{
color:#444;
margin-top:4px;
}

.add{
background:#06c755;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

#cartButton{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#06c755;
color:white;
padding:14px;
text-align:center;
border-radius:10px;
font-weight:bold;
display:none;
}

</style>
</head>

<body>

<div id="categories"></div>
<div id="menu"></div>

<div id="cartButton" onclick="openCart()"></div>

<script>

const LIFF_ID = "2009308319-2r1OXrGI"

let products=[]
let cart=[]
let activeCategory=null

async function init(){

await liff.init({liffId:LIFF_ID})

if(!liff.isLoggedIn()){
liff.login()
return
}

loadProducts()

}

function sortProducts(items){

return items.sort((a,b)=>{

let ca=a.category||""
let cb=b.category||""

let na=parseInt(ca.split("_")[0])||0
let nb=parseInt(cb.split("_")[0])||0

return na-nb

})

}

function cleanCategory(name){

if(!name) return "อื่นๆ"

return name.replace(/^[0-9]+_/,"")

}

async function loadProducts(){

const res = await fetch("/api/products")
let data = await res.json()

products = sortProducts(data)

renderCategories()
renderMenu()

}

function renderCategories(){

let map = {}

products.forEach(p=>{
let c = cleanCategory(p.category)
map[c]=true
})

let list = Object.keys(map)

activeCategory = list[0]

const div=document.getElementById("categories")
div.innerHTML=""

list.forEach(c=>{

let el=document.createElement("div")
el.className="category"+(c===activeCategory?" active":"")
el.innerText=c

el.onclick=()=>{
activeCategory=c
renderCategories()
renderMenu()
}

div.appendChild(el)

})

}

function renderMenu(){

const div=document.getElementById("menu")
div.innerHTML=""

products
.filter(p=>cleanCategory(p.category)===activeCategory)
.forEach(p=>{

let card=document.createElement("div")
card.className="card"

let img=p.image_url||"https://via.placeholder.com/80"

card.innerHTML=`

<img src="${img}">

<div class="info">
<div class="name">${p.name}</div>
<div class="price">฿${(p.price/100).toFixed(0)}</div>
</div>

<button class="add">เพิ่ม</button>

`

card.querySelector(".add").onclick=()=>addToCart(p)

div.appendChild(card)

})

}

function addToCart(product){

cart.push({
variant_id:product.variant_id,
name:product.name,
price:product.price,
quantity:1,
modifier_options:[]
})

updateCart()

}

function updateCart(){

let total=0
let qty=0

cart.forEach(i=>{
total+=i.price*i.quantity
qty+=i.quantity
})

const btn=document.getElementById("cartButton")

if(qty===0){
btn.style.display="none"
return
}

btn.style.display="block"
btn.innerText=`🛒 ดูตะกร้า (${qty}) ฿${(total/100).toFixed(0)}`

}

function openCart(){

alert("Cart UI จะทำในขั้นต่อไป")

}

init()

</script>

</body>
</html>
