<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LIFF POS TEST</title>
</head>
<body>

<h2>ทดสอบระบบ</h2>
<div id="menu">เริ่มต้น...</div>

<script>
document.getElementById("menu").innerHTML = "JS ทำงานแล้ว ✅";

fetch("https://liff-pos.vercel.app/api/products")
  .then(res => res.json())
  .then(data => {
    document.getElementById("menu").innerHTML =
      "โหลดสำเร็จ ✅ จำนวนสินค้า: " + data.items.length;
  })
  .catch(err => {
    document.getElementById("menu").innerHTML =
      "เกิด error ❌ " + err;
  });
</script>

</body>
</html>
