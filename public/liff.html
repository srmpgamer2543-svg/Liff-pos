<script>

let products=[]
let cart=[]
let currentProduct=null

function cleanCategory(name){
return name.replace(/^\d+_/,'')
}

function sortCategory(a,b){
let na=parseInt(a.split('_')[0])
let nb=parseInt(b.split('_')[0])
if(isNaN(na)) na=999
if(isNaN(nb)) nb=999
return na-nb
}

function sortProducts(list){

return list.sort((a,b)=>{

let ca=parseInt(a.category.split('_')[0])
let cb=parseInt(b.category.split('_')[0])

if(isNaN(ca)) ca=999
if(isNaN(cb)) cb=999

if(ca!==cb) return ca-cb

return a.name.localeCompare(b.name)

})

}

async function init(){

await liff.init({liffId:"2009308319-2r1OXrGI"})

let res=await fetch('/api/products')
products=await res.json()

products=sortProducts(products)

renderCategory()
renderMenu(products)

}

function renderCategory(){

let cats=[...new Set(products.map(p=>p.category))]

cats.sort(sortCategory)

let html='<button onclick="renderMenu(products)">All</button>'

cats.forEach(c=>{
html+=`<button onclick="filterCat('${c}')">${cleanCategory(c)}</button>`
})

document.getElementById('category').innerHTML=html

}

function filterCat(c){

let list=products.filter(p=>p.category==c)

renderMenu(sortProducts(list))

}

function renderMenu(items){

let html=''

items.forEach(p=>{

html+=`

<div class="card" onclick="openProduct('${p.id}')">

<div class="card-img">

<img src="${p.image_url || ''}">

<div class="add-btn">+</div>

</div>

<div class="card-body">

<div class="name">${p.name}</div>

<div class="price">${p.price} ฿</div>

</div>

</div>

`

})

document.getElementById('menu').innerHTML=html

}

function openProduct(id){

let p=products.find(x=>x.id==id)
currentProduct=p

let html=`<div class="modal-content" onclick="event.stopPropagation()">`

html+=`<h3>${p.name}</h3>`

p.modifiers.forEach(m=>{

html+=`<h4>${m.name}</h4>`

if(m.name.includes('ท้อปปิ้ง')){

m.options.forEach(o=>{
html+=`
<label>
<input type="checkbox" value="${o.id}">
${o.name}
</label><br>`
})

}else{

m.options.forEach(o=>{
html+=`
<label>
<input type="radio" name="${m.id}" value="${o.id}">
${o.name}
</label><br>`
})

}

})

html+=`<br><button onclick="addCart()">เพิ่มลงตะกร้า</button>`
html+=`</div>`

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

modal.onclick=function(){
modal.classList.remove('show')
}

}

function validateModifiers(){

let required=['ความหวาน','เย็น','ปั่น']

for(let r of required){

let found=false

document.querySelectorAll('h4').forEach(h=>{

if(h.innerText.includes(r)){

let group=h.nextElementSibling

let radios=document.querySelectorAll(`input[name]`)

let checked=false

radios.forEach(r=>{
if(r.checked) checked=true
})

if(!checked){
alert("กรุณาเลือก "+r)
found=true
}

}

})

if(found) return false

}

return true

}

function addCart(){

if(!validateModifiers()) return

cart.push(currentProduct)

document.getElementById('cartCount').innerText=cart.length

document.getElementById('modal').classList.remove('show')

}

function openCart(){

let html='<div onclick="event.stopPropagation()">'

html+='<h3>Cart</h3>'

cart.forEach(c=>{
html+=`${c.name}<br>`
})

html+='<br><button onclick="sendOrder()">Order</button>'
html+='</div>'

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

modal.onclick=function(){
modal.classList.remove('show')
}

}

async function sendOrder(){

await fetch('/api/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(cart)
})

alert('Order sent')

}

init()

</script>
