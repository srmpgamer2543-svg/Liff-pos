<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
background:#06c755;
color:white;
padding:14px;
font-size:18px;
display:flex;
justify-content:space-between;
}

.category{
display:flex;
overflow:auto;
background:white;
padding:8px;
gap:8px;
}

.category button{
border:none;
background:#eee;
padding:6px 12px;
border-radius:20px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-body{
padding:8px;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
color:white;
padding:12px 16px;
border-radius:30px;
}

.modal{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
transition:0.3s;
}

.modal.show{
bottom:0;
}

</style>
</head>

<body>

<div class="header">
<span>Menu</span>
<span onclick="openCart()">🛒</span>
</div>

<div class="category" id="category"></div>

<div class="menu" id="menu"></div>

<div class="cart-btn" onclick="openCart()">
Cart (<span id="cartCount">0</span>)
</div>

<div id="modal" class="modal"></div>

<script>

let products=[]
let cart=[]
let currentProduct=null

async function init(){

await liff.init({liffId:"2009308319-2r1OXrGI"})

let res=await fetch('/api/products')
products=await res.json()

renderCategory()
renderMenu(products)

}

function renderCategory(){

let cats=[...new Set(products.map(p=>p.category))]

let html='<button onclick="renderMenu(products)">All</button>'

cats.forEach(c=>{
html+=`<button onclick="filterCat('${c}')">${c}</button>`
})

document.getElementById('category').innerHTML=html

}

function filterCat(c){
renderMenu(products.filter(p=>p.category==c))
}

function renderMenu(items){

let html=''

items.forEach(p=>{

html+=`
<div class="card" onclick="openProduct('${p.id}')">

<img src="${p.image_url || ''}">

<div class="card-body">

<b>${p.name}</b><br>

${p.price} ฿

</div>
</div>
`

})

document.getElementById('menu').innerHTML=html

}

function openProduct(id){

let p=products.find(x=>x.id==id)
currentProduct=p

let html=`<h3>${p.name}</h3>`

p.modifiers.forEach(m=>{

html+=`<h4>${m.name}</h4>`

if(m.name.includes('ท้อปปิ้ง')){

m.options.forEach(o=>{
html+=`
<label>
<input type="checkbox" value="${o.id}">
${o.name}
</label><br>`
})

}else{

m.options.forEach(o=>{
html+=`
<label>
<input type="radio" name="${m.id}" value="${o.id}">
${o.name}
</label><br>`
})

}

})

html+=`<br><button onclick="addCart()">เพิ่มลงตะกร้า</button>`

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

}

function addCart(){

cart.push(currentProduct)

document.getElementById('cartCount').innerText=cart.length

document.getElementById('modal').classList.remove('show')

}

function openCart(){

let html='<h3>Cart</h3>'

cart.forEach(c=>{
html+=`${c.name}<br>`
})

html+='<button onclick="sendOrder()">Order</button>'

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

}

async function sendOrder(){

await fetch('/api/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(cart)
})

alert('Order sent')

}

init()

</script>

</body>
</html>
