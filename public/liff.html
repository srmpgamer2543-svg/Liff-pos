<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;
}

/* 3 คอลัมน์ */
#menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

/* การ์ดสินค้า */
.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 5px 12px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 170px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-4px);
}

/* แถบสีเขียวด้านบน */
.card-top {
  height: 8px;
  background: linear-gradient(90deg, #2e7d32, #43a047);
}

/* เนื้อหา */
.card-content {
  padding: 12px;
  text-align: center;
  flex-grow: 1;
}

.card h3 {
  font-size: 17px;
  margin: 8px 0;
  font-weight: bold;
}

.price {
  font-size: 18px;
  font-weight: bold;
  color: #ff6a00;
  margin: 8px 0;
}

/* ปุ่ม */
button {
  margin: 10px;
  padding: 10px 0;
  border: none;
  border-radius: 10px;
  background: #ff6a00;
  color: white;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  background: #e65c00;
}
</style>
</head>

<body>

<h2>เมนูสินค้า</h2>
<div id="menu">กำลังโหลด...</div>

<script>
async function loadProducts() {
  const container = document.getElementById("menu");

  try {
    const res = await fetch("https://liff-pos.vercel.app/api/products");
    const data = await res.json();

    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = "ไม่มีข้อมูลสินค้า";
      return;
    }

    data.forEach(item => {

      const box = document.createElement("div");
      box.className = "card";

      const price = Number(item.price || 0);

      box.innerHTML = `
        <div class="card-top"></div>
        <div class="card-content">
          <h3>${item.name}</h3>
          <div class="price">${price} บาท</div>
        </div>
        <button onclick="alert('เพิ่มแล้ว')">เพิ่ม</button>
      `;

      container.appendChild(box);
    });

  } catch (err) {
    container.innerHTML = "โหลดสินค้าไม่สำเร็จ";
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
