<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:Arial;
background:#000;
color:white;
margin:0;
padding:15px;
}

h2{
text-align:center;
}

#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
border-radius:18px;
overflow:hidden;
background:#111;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.name{
font-size:16px;
padding:8px;
}

.price{
color:orange;
padding:0 8px 8px;
}

#modifierModal,#cartModal{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:white;
color:black;
height:70%;
padding:20px;
border-radius:25px 25px 0 0;
transition:0.3s;
overflow:auto;
}

.active{
bottom:0 !important;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.addbtn{
background:orange;
color:white;
width:100%;
margin-top:10px;
}

.cartbtn{
position:fixed;
bottom:20px;
right:20px;
background:orange;
width:70px;
height:70px;
border-radius:50%;
font-size:30px;
color:white;
}

.qty{
display:flex;
gap:10px;
align-items:center;
}

</style>

</head>

<body>

<h2>เมนูสินค้า</h2>

<div id="menu"></div>

<button class="cartbtn" onclick="openCart()">🛒</button>

<div id="modifierModal">
<div id="modifierContent"></div>
</div>

<div id="cartModal">
<div id="cartContent"></div>
</div>

<script>

let cart=[]
let products=[]
let currentProduct=null

async function init(){

await liff.init({liffId:"2009308319-2r1OXrGI"})
loadProducts()

}

async function loadProducts(){

const res=await fetch("/api/products")
products=await res.json()

const menu=document.getElementById("menu")
menu.innerHTML=""

products.forEach(p=>{

const image=p.image_url || "https://via.placeholder.com/400"

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<img src="${image}">
<div class="name">${p.name}</div>
<div class="price">${p.price} บาท</div>
`

div.onclick=()=>openModifier(p)

menu.appendChild(div)

})

}

function openModifier(product){

if(!product.modifiers || product.modifiers.length===0){
addToCart(product,[],0,[])
return
}

currentProduct=product

let html=`<h3>${product.name}</h3>`

product.modifiers.forEach(m=>{

if(!m.options || m.options.length===0) return

html+=`<h4>${m.name}</h4>`

const inputType = m.type === "multi" ? "checkbox" : "radio"

m.options.forEach(o=>{

const price = Number(o.price) || 0

html+=`
<label style="display:block;margin-bottom:6px">
<input 
type="${inputType}"
name="mod_${m.id}"
value="${o.id}"
data-name="${o.name}"
data-price="${price}">
${o.name} ${price>0?`(+${price})`:""}
</label>
`

})

})

html+=`<button class="addbtn" onclick="confirmModifier()">เพิ่มลงตะกร้า</button>`

document.getElementById("modifierContent").innerHTML=html
document.getElementById("modifierModal").classList.add("active")

}

function confirmModifier(){

const checked=document.querySelectorAll("#modifierContent input:checked")

let names=[]
let extra=0
let modifiers=[]

checked.forEach(c=>{

const price = Number(c.dataset.price) || 0

names.push(c.dataset.name)
extra+=price

modifiers.push({
option_id:c.value
})

})

addToCart(currentProduct,names,extra,modifiers)

closeModifier()

}

function closeModifier(){
document.getElementById("modifierModal").classList.remove("active")
}

function addToCart(product,mods,extra,modifier_ids){

const name=mods.length
?product.name+" ("+mods.join(", ")+")"
:product.name

cart.push({
id:Date.now(),
product_id:product.id,
name:name,
price:Number(product.price)+extra,
qty:1,
modifiers:modifier_ids
})

renderCart()

}

function openCart(){

renderCart()
document.getElementById("cartModal").classList.add("active")

}

function closeCart(){

document.getElementById("cartModal").classList.remove("active")

}

function changeQty(id,delta){

const item=cart.find(i=>i.id==id)

item.qty+=delta

if(item.qty<=0){
cart=cart.filter(i=>i.id!=id)
}

renderCart()

}

function renderCart(){

const c=document.getElementById("cartContent")

if(cart.length===0){

c.innerHTML="<h3>ตะกร้าว่าง</h3>"
return

}

let total=0

let html="<h3>ตะกร้า</h3>"

cart.forEach(i=>{

total+=i.price*i.qty

html+=`
<div style="display:flex;justify-content:space-between;margin:10px 0">
<div>
${i.name}
<div class="qty">
<button onclick="changeQty('${i.id}',-1)">-</button>
${i.qty}
<button onclick="changeQty('${i.id}',1)">+</button>
</div>
</div>
<div>${i.price*i.qty}</div>
</div>
`

})

html+=`<hr><h3>รวม ${total} บาท</h3>`
html+=`<button class="addbtn" onclick="submitOrder()">สั่งซื้อ</button>`

c.innerHTML=html

}

async function submitOrder(){

if(cart.length===0){
alert("ไม่มีสินค้า")
return
}

const items=cart.map(i=>({

variant_id:i.product_id,
quantity:i.qty,
modifier_options:i.modifiers

}))

await fetch("/api/order",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({items})
})

alert("สั่งซื้อสำเร็จ")

cart=[]
renderCart()
closeCart()

}

init()

</script>

</body>
</html>
