<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIFF POS</title>

<style>
body{
font-family:'Prompt',Arial,sans-serif;
background:#000;
margin:0;
padding:18px;
color:white;
}

h2{
text-align:center;
margin-bottom:25px;
font-size:32px;
font-weight:700;
}

#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.card{
position:relative;
border-radius:22px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:14px;
background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,0));
}

.name{
font-size:18px;
font-weight:600;
}

.price{
font-size:18px;
font-weight:bold;
color:#ff7a00;
margin-top:4px;
}

/* MODIFIER POPUP */

#modifierModal{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:white;
color:black;
height:75%;
border-radius:30px 30px 0 0;
padding:20px;
overflow-y:auto;
transition:.3s;
}

#modifierModal.active{
bottom:0;
}

.mod-title{
font-size:20px;
font-weight:bold;
margin-top:20px;
}

.mod-option{
margin:8px 0;
font-size:18px;
}

.confirm-btn{
width:100%;
padding:16px;
margin-top:20px;
background:#ff7a00;
color:white;
border:none;
border-radius:25px;
font-size:20px;
}

/* CART */

.cart-open-btn{
position:fixed;
bottom:25px;
right:25px;
width:80px;
height:80px;
border-radius:50%;
background:#ff7a00;
color:white;
font-size:32px;
border:none;
}

#cartModal{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:white;
color:black;
height:75%;
border-radius:30px 30px 0 0;
padding:20px;
overflow-y:auto;
transition:.3s;
}

#cartModal.active{
bottom:0;
}

.qty-btn{
padding:6px 12px;
margin:0 6px;
border:none;
border-radius:8px;
font-size:18px;
}

.plus{background:#4CAF50;color:white;}
.minus{background:#f44336;color:white;}

.order-btn{
width:100%;
padding:16px;
margin-top:20px;
background:#ff7a00;
color:white;
border:none;
border-radius:25px;
font-size:20px;
}

</style>
</head>

<body>

<h2>เมนูสินค้า</h2>

<div id="menu"></div>

<button class="cart-open-btn" onclick="openCart()">🛍</button>

<div id="cartModal">
<div id="cartContent"></div>
</div>

<div id="modifierModal">
<div id="modifierContent"></div>
</div>

<script>

let cart=[];
let currentProduct=null;

async function loadProducts(){

const container=document.getElementById("menu");
container.innerHTML="";

const res=await fetch("https://liff-pos.vercel.app/api/products");
const data=await res.json();

data.forEach(item=>{

const box=document.createElement("div");
box.className="card";
box.onclick=()=>openModifier(item);

const image=item.image_url
?item.image_url
:"https://via.placeholder.com/400x300?text=No+Image";

box.innerHTML=`
<img src="${image}">
<div class="card-overlay">
<div class="name">${item.name}</div>
<div class="price">${item.price} บาท</div>
</div>
`;

container.appendChild(box);

});

}

function openModifier(product){

if(!product.modifiers || product.modifiers.length===0){
addToCart(product,[]);
return;
}

currentProduct=product;

const modal=document.getElementById("modifierModal");
const content=document.getElementById("modifierContent");

content.innerHTML=`<h3>${product.name}</h3>`;

product.modifiers.forEach(mod=>{

content.innerHTML+=`<div class="mod-title">${mod.name}</div>`;

mod.options.forEach(opt=>{

content.innerHTML+=`
<div class="mod-option">
<label>
<input type="checkbox" name="mod" value="${opt.name}" data-price="${opt.price}">
${opt.name} (+${opt.price})
</label>
</div>
`;

});

});

content.innerHTML+=`
<button class="confirm-btn" onclick="confirmModifier()">เพิ่มลงตะกร้า</button>
`;

modal.classList.add("active");

}

function confirmModifier(){

const selected=[...document.querySelectorAll("input[name='mod']:checked")];

let extraPrice=0;
let names=[];

selected.forEach(el=>{
extraPrice+=Number(el.dataset.price);
names.push(el.value);
});

addToCart(currentProduct,names,extraPrice);

closeModifier();

}

function closeModifier(){
document.getElementById("modifierModal").classList.remove("active");
}

function addToCart(product,mods=[],extra=0){

const name=mods.length
?product.name+" ("+mods.join(", ")+")"
:product.name;

cart.push({
id:product.id+Date.now(),
name:name,
price:product.price+extra,
qty:1
});

renderCart();

}

function changeQty(id,delta){

const item=cart.find(i=>i.id===id);
if(!item)return;

item.qty+=delta;

if(item.qty<=0){
cart=cart.filter(i=>i.id!==id);
}

renderCart();

}

function renderCart(){

const container=document.getElementById("cartContent");

if(cart.length===0){
container.innerHTML="<h3>ตะกร้าว่าง</h3>";
return;
}

let total=0;

container.innerHTML="<h3>รายการสินค้า</h3>";

cart.forEach(item=>{

total+=item.price*item.qty;

container.innerHTML+=`
<div style="display:flex;justify-content:space-between;margin:14px 0;font-size:18px;">
<div>
${item.name}<br>
<button class="qty-btn minus" onclick="changeQty('${item.id}',-1)">−</button>
${item.qty}
<button class="qty-btn plus" onclick="changeQty('${item.id}',1)">+</button>
</div>
<div>${item.price*item.qty} บาท</div>
</div>
`;

});

container.innerHTML+=`
<hr>
<h3>รวมทั้งหมด: ${total} บาท</h3>
<button class="order-btn" onclick="submitOrder()">สั่งซื้อ</button>
`;

}

function submitOrder(){

alert("สั่งซื้อสำเร็จ (ตัวอย่าง)");

cart=[];
renderCart();
closeCart();

}

function openCart(){
document.getElementById("cartModal").classList.add("active");
}

function closeCart(){
document.getElementById("cartModal").classList.remove("active");
}

document.addEventListener("DOMContentLoaded",loadProducts);

</script>

</body>
</html>
