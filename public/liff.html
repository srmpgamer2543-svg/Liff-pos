<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
font-size:30px;
scroll-behavior:smooth;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:999;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.logo-area{
height:20vh;
display:flex;
align-items:center;
justify-content:center;
transition:height .25s ease, opacity .25s ease;
overflow:hidden;
}

.logo-area img{
width:100%;
height:100%;
object-fit:contain;
padding:10px;
}

.shop-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
border-top:1px solid #eee;
background:#f0fff4;
border:3px solid #06c755;
border-radius:16px;
margin:10px;
}

.shop-title{
font-size:36px;
font-weight:800;
color:#5a2d0c;
}

.cart-icon{
font-size:48px;
cursor:pointer;
}

.category{
display:flex;
overflow:auto;
background:white;
padding:12px;
gap:10px;
border-bottom:1px solid #eee;
}

.category button{
border:none;
background:#eee;
padding:12px 20px;
border-radius:20px;
white-space:nowrap;
font-size:30px;
font-weight:600;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:14px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
aspect-ratio:3/4;
cursor:pointer;
}

.card-img{
position:relative;
width:100%;
aspect-ratio:1/1;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

.add-btn{
position:absolute;
bottom:10px;
right:10px;
background:#06c755;
color:white;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

.card-body{
padding:14px;
flex:1;
display:flex;
flex-direction:column;
}

.name{
font-size:40px;
font-weight:700;
}

.price{
color:#06c755;
font-weight:bold;
font-size:42px;
margin-top:auto;
}

.floating-cart{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#06c755;
color:white;
padding:20px;
border-radius:30px;
display:none;
font-size:34px;
font-weight:bold;
text-align:center;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:flex-end;
}

.modal.show{
display:flex;
}

.modal-content{
background:white;
width:100%;
border-radius:24px 24px 0 0;
padding:28px;
max-height:70vh;
overflow:auto;
}

.option{
display:flex;
align-items:center;
gap:18px;
padding:22px;
border-radius:18px;
background:#fafafa;
font-size:30px;
margin-bottom:10px;
}

.option input{
margin-right:10px;
}

button{
font-size:34px;
padding:18px;
border:none;
background:#06c755;
color:white;
border-radius:16px;
width:100%;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo-area" id="logoArea">
<img src="logo.png">
</div>

<div class="shop-bar">

<div class="shop-title">
มีนม.ขนมปัง🍞
</div>

<div class="cart-icon" onclick="openCart()">
🧺
</div>

</div>

</div>

<div class="category" id="category"></div>
<div class="menu" id="menu"></div>

<div class="floating-cart" id="floatingCart" onclick="openCart()">
ดูตะกร้า • <span id="floatingTotal">0</span> บาท
</div>

<div id="modal" class="modal"></div>

<script>

let products=[]
let cart=[]
let currentProduct=null

function cleanCategory(name){
if(!name) return "อื่นๆ"
return name.replace(/^\d+_/,'')
}

function sortCategory(a,b){
let na=parseInt(a.split('_')[0])||999
let nb=parseInt(b.split('_')[0])||999
return na-nb
}

function sortProducts(list){
return list.sort((a,b)=>{
let ca=parseInt(a.category?.split('_')[0])||999
let cb=parseInt(b.category?.split('_')[0])||999
if(ca!==cb) return ca-cb
return a.name.localeCompare(b.name)
})
}

function sortModifiers(mods){

let order=["เย็น","ปั่น","หวาน","ท้อปปิ้ง"]

return mods.sort((a,b)=>{

let ai=order.findIndex(o=>a.name.includes(o))
let bi=order.findIndex(o=>b.name.includes(o))

if(ai==-1) ai=99
if(bi==-1) bi=99

return ai-bi

})

}

async function init(){

try{

await liff.init({liffId:"2009308319-2r1OXrGI"})

let res=await fetch('/api/products')
products=await res.json()

products=products.map(p=>{
if(!p.category)p.category="999_อื่นๆ"
return p
})

products=sortProducts(products)

renderCategory()
renderMenu(products)

}catch(e){

alert("โหลดเมนูไม่สำเร็จ")

}

}

function renderCategory(){

let cats=[...new Set(products.map(p=>p.category))]
cats.sort(sortCategory)

let html='<button onclick="renderMenu(products)">All</button>'

cats.forEach(c=>{
html+=`<button onclick="filterCat('${c}')">${cleanCategory(c)}</button>`
})

document.getElementById('category').innerHTML=html

}

function filterCat(c){
let list=products.filter(p=>p.category==c)
renderMenu(list)
}

function renderMenu(items){

let html=''

items.forEach(p=>{

html+=`
<div class="card" onclick="openProduct('${p.id}')">

<div class="card-img">
<img src="${p.image_url||''}">
<div class="add-btn">+</div>
</div>

<div class="card-body">
<div class="name">${p.name}</div>
<div class="price">${p.price} ฿</div>
</div>

</div>
`

})

document.getElementById('menu').innerHTML=html

}

function openProduct(id){

let p=products.find(x=>x.id==id)
currentProduct=p

let mods=sortModifiers([...p.modifiers])

let html=`<div class="modal-content" onclick="event.stopPropagation()">`
html+=`<h3>${p.name}</h3>`

mods.forEach(m=>{

html+=`<h4>${m.name}</h4>`

m.options.forEach(o=>{

if(m.name.includes('ท้อปปิ้ง')){

html+=`
<label class="option">
<input type="checkbox" value="${o.id}" data-price="${o.price||0}">
${o.name} ${o.price?`(+${o.price})`:''}
</label>
`

}else{

html+=`
<label class="option">
<input type="radio" name="${m.id}" value="${o.id}" data-price="${o.price||0}">
${o.name} ${o.price?`(+${o.price})`:''}
</label>
`

}

})

})

html+=`<button onclick="addCart()">เพิ่มลงตะกร้า</button>`
html+=`</div>`

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

modal.onclick=function(){
modal.classList.remove('show')
}

}

function validateRequired(){
return true
}

function addCart(){

let modifiers=[]
let extra=0

document.querySelectorAll(".modal-content input:checked").forEach(i=>{

let price=parseInt(i.dataset.price)||0

modifiers.push({
name:i.parentElement.innerText.trim(),
price:price
})

extra+=price

})

let item={
name:currentProduct.name,
price:currentProduct.price,
modifiers:modifiers,
qty:1
}

cart.push(item)

updateFloating()

document.getElementById('modal').classList.remove('show')

}

function updateFloating(){

let total=0

cart.forEach(c=>{
let mod=0
c.modifiers.forEach(m=>mod+=m.price)
total+=(c.price+mod)*(c.qty||1)
})

document.getElementById('floatingTotal').innerText=total
document.getElementById('floatingCart').style.display="block"

}

function openCart(){

let html=`<div class="modal-content" onclick="event.stopPropagation()">`

html+=`<h3>Cart</h3>`

let total=0

cart.forEach((c,i)=>{

let modPrice=0

let modText=c.modifiers.map(m=>{
modPrice+=m.price
return `${m.name}`
}).join(', ')

let itemPrice=(c.price+modPrice)*(c.qty||1)
total+=itemPrice

html+=`

<div style="border-bottom:1px solid #eee;padding:10px 0">

<div style="font-weight:bold">${c.name}</div>
<div style="font-size:24px;color:#777">${modText}</div>
<div>${itemPrice} ฿</div>

<div>

<button onclick="decreaseQty(${i})">-</button>
${c.qty}
<button onclick="increaseQty(${i})">+</button>

<button onclick="removeItem(${i})">ลบ</button>

</div>

</div>

`

})

html+=`

<div style="font-size:36px;font-weight:bold">
รวม ${total} ฿
</div>

<button onclick="sendOrder()">Order</button>

</div>
`

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

}

function increaseQty(i){
cart[i].qty++
openCart()
updateFloating()
}

function decreaseQty(i){

if(cart[i].qty>1){
cart[i].qty--
}else{
cart.splice(i,1)
}

openCart()
updateFloating()

}

function removeItem(i){
cart.splice(i,1)
openCart()
updateFloating()
}

function closeModal(){
document.getElementById('modal').classList.remove('show')
}

async function sendOrder(){

await fetch('/api/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(cart)
})

alert("Order sent")

}

const logo=document.getElementById("logoArea")

window.addEventListener("scroll",()=>{

let y=window.scrollY
let max=120

if(y<=max){

let progress=Math.min(y/max,1)

logo.style.height=(20-progress*20)+"vh"
logo.style.opacity=1-progress

}else{

logo.style.height="0vh"
logo.style.opacity="0"

}

})

init()

</script>

</body>
</html>
