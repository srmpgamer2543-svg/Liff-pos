<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

.header{
  background:white;
  padding:14px;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #eee;
}

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:14px;
}

.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  position:relative;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.badge{
  position:absolute;
  top:8px;
  left:8px;
  background:#ff4d4f;
  color:white;
  font-size:12px;
  padding:4px 8px;
  border-radius:20px;
}

.info{
  padding:10px;
}

.name{
  font-size:15px;
  font-weight:600;
  min-height:38px;
}

.price-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}

.price{
  font-size:16px;
  font-weight:bold;
}

.add-btn{
  background:#1DB446;
  width:34px;
  height:34px;
  border-radius:50%;
  color:white;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.cart-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  border-top:1px solid #ddd;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart-btn{
  background:#1DB446;
  color:white;
  padding:10px 18px;
  border-radius:30px;
}

</style>
</head>

<body>

<div class="header">
เมนูร้าน
</div>

<div id="menu" class="menu-grid"></div>

<div class="cart-bar">
<div id="cartTotal">0 บาท</div>
<div class="cart-btn" onclick="openCart()">ดูตะกร้า</div>
</div>

<script>

let products=[]
let cart=[]

async function main(){

await liff.init({
liffId:"2009308319-2r1OXrGI"
})

loadProducts()

}

async function loadProducts(){

const res = await fetch("/api/products")
products = await res.json()

products = sortProducts(products)

renderMenu()

}

function sortProducts(items){

return items.sort((a,b)=>{

const ca = parseInt(a.category) || 999
const cb = parseInt(b.category) || 999

if(ca !== cb) return ca - cb

return a.name.localeCompare(b.name)

})

}

function renderMenu(){

const menu = document.getElementById("menu")

menu.innerHTML=""

products.forEach((p,i)=>{

const img = p.image_url || "https://placehold.co/400x300?text=Menu"

menu.innerHTML +=`

<div class="card">

<div class="badge">ขายดี</div>

<img src="${img}">

<div class="info">

<div class="name">
${p.name}
</div>

<div class="price-row">

<div class="price">
฿${p.price}
</div>

<div class="add-btn" onclick="addToCart('${p.variant_id}')">
+
</div>

</div>

</div>

</div>

`

})

}

function addToCart(variant_id){

const product = products.find(p=>p.variant_id===variant_id)

cart.push({
variant_id:variant_id,
name:product.name,
price:product.price,
qty:1
})

updateCart()

}

function updateCart(){

let total=0

cart.forEach(i=>{
total+=i.price*i.qty
})

document.getElementById("cartTotal").innerText =
cart.length+" รายการ • ฿"+total

}

function openCart(){

let text="รายการอาหาร\n\n"

cart.forEach(i=>{
text+=i.name+" x"+i.qty+"\n"
})

alert(text)

}

main()

</script>

</body>
</html>
