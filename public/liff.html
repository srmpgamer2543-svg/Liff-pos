<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Menu</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
font-size:18px;
}

.header{
background:#06c755;
color:white;
padding:18px;
font-size:22px;
display:flex;
justify-content:space-between;
align-items:center;
}

.category{
display:flex;
overflow:auto;
background:white;
padding:12px;
gap:10px;
border-bottom:1px solid #eee;
}

.category button{
border:none;
background:#eee;
padding:12px 20px;
border-radius:20px;
white-space:nowrap;
font-size:18px;
color:black;
font-weight:600;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:14px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
aspect-ratio:3/4;
cursor:pointer;
}

.card-img{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

.add-btn{
position:absolute;
bottom:10px;
right:10px;
background:#06c755;
color:white;
width:48px;
height:48px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

.card-body{
padding:16px;
flex-grow:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.name{
font-size:240px;
font-weight:800;
line-height:1.2;
}

.price{
color:#06c755;
font-weight:bold;
font-size:220px;
margin-top:8px;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
color:white;
padding:18px 26px;
border-radius:30px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
font-size:20px;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:flex-end;
}

.modal.show{
display:flex;
}

.modal-content{
background:white;
width:100%;
border-radius:24px 24px 0 0;
padding:22px;
max-height:80%;
overflow:auto;
}

.modal-content h3{
font-size:26px;
margin-bottom:16px;
}

.modal-content h4{
font-size:22px;
margin-top:20px;
margin-bottom:12px;
}

.modifier-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
display:flex;
align-items:center;
gap:12px;
padding:16px;
border-radius:14px;
background:#f5f5f5;
font-size:20px;
}

.option input{
transform:scale(1.8);
}

button{
font-size:22px;
padding:16px;
border:none;
background:#06c755;
color:white;
border-radius:14px;
width:100%;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
<span>Menu</span>
<span onclick="openCart()">🛒</span>
</div>

<div class="category" id="category"></div>

<div class="menu" id="menu"></div>

<div class="cart-btn" onclick="openCart()">
Cart (<span id="cartCount">0</span>)
</div>

<div id="modal" class="modal"></div>

<script>

let products=[]
let cart=[]
let currentProduct=null

function cleanCategory(name){
return name.replace(/^\d+_/,'')
}

function sortCategory(a,b){
let na=parseInt(a.split('_')[0])
let nb=parseInt(b.split('_')[0])
if(isNaN(na)) na=999
if(isNaN(nb)) nb=999
return na-nb
}

function sortProducts(list){

return list.sort((a,b)=>{

let ca=parseInt(a.category.split('_')[0])
let cb=parseInt(b.category.split('_')[0])

if(isNaN(ca)) ca=999
if(isNaN(cb)) cb=999

if(ca!==cb) return ca-cb

return a.name.localeCompare(b.name)

})

}

function sortModifiers(mods){

return mods.sort((a,b)=>{

let order = ["เย็น","ปั่น","หวาน","ท้อปปิ้ง"]

let ai = order.findIndex(o=>a.name.includes(o))
let bi = order.findIndex(o=>b.name.includes(o))

if(ai==-1) ai=99
if(bi==-1) bi=99

return ai-bi

})

}

async function init(){

await liff.init({liffId:"2009308319-2r1OXrGI"})

let res=await fetch('/api/products')
products=await res.json()

products=sortProducts(products)

renderCategory()
renderMenu(products)

}

function renderCategory(){

let cats=[...new Set(products.map(p=>p.category))]
cats.sort(sortCategory)

let html='<button onclick="renderMenu(products)">All</button>'

cats.forEach(c=>{
html+=`<button onclick="filterCat('${c}')">${cleanCategory(c)}</button>`
})

document.getElementById('category').innerHTML=html

}

function filterCat(c){
let list=products.filter(p=>p.category==c)
renderMenu(sortProducts(list))
}

function renderMenu(items){

let html=''

items.forEach(p=>{

html+=`

<div class="card" onclick="openProduct('${p.id}')">

<div class="card-img">
<img src="${p.image_url || ''}">
<div class="add-btn">+</div>
</div>

<div class="card-body">
<div class="name">${p.name}</div>
<div class="price">${p.price} ฿</div>
</div>

</div>

`

})

document.getElementById('menu').innerHTML=html

}

function openProduct(id){

let p=products.find(x=>x.id==id)
currentProduct=p

let mods=sortModifiers([...p.modifiers])

let html=`<div class="modal-content" onclick="event.stopPropagation()">`

html+=`<h3>${p.name}</h3>`

mods.forEach(m=>{

html+=`<h4>${m.name}</h4>`
html+=`<div class="modifier-grid">`

if(m.name.includes('ท้อปปิ้ง')){

m.options.forEach(o=>{
html+=`
<label class="option">
<input type="checkbox" value="${o.id}">
${o.name}
</label>`
})

}else{

m.options.forEach(o=>{
html+=`
<label class="option">
<input type="radio" name="${m.id}" value="${o.id}">
${o.name}
</label>`
})

}

html+=`</div>`

})

html+=`<button onclick="addCart()">เพิ่มลงตะกร้า</button>`
html+=`</div>`

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

modal.onclick=function(){
modal.classList.remove('show')
}

}

function validateRequired(){

let iceGroup=document.querySelector("input[name][value]")

let groups=document.querySelectorAll("h4")

for(let g of groups){

let name=g.innerText

if(name.includes("เย็น") || name.includes("ปั่น")){

let inputs=g.parentElement.querySelectorAll("input[type=radio]")

let checked=false

inputs.forEach(i=>{
if(i.checked) checked=true
})

if(!checked){
alert("กรุณาเลือก เย็น หรือ ปั่น")
return false
}

}

}

return true

}

function addCart(){

if(!validateRequired()) return

cart.push(currentProduct)

document.getElementById('cartCount').innerText=cart.length

document.getElementById('modal').classList.remove('show')

}

function openCart(){

let html=`<div class="modal-content" onclick="event.stopPropagation()">`

html+='<h3>Cart</h3>'

cart.forEach(c=>{
html+=`${c.name}<br>`
})

html+='<button onclick="sendOrder()">Order</button>'
html+='</div>'

let modal=document.getElementById('modal')
modal.innerHTML=html
modal.classList.add('show')

modal.onclick=function(){
modal.classList.remove('show')
}

}

async function sendOrder(){

await fetch('/api/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(cart)
})

alert('Order sent')

}

init()

</script>

</body>
</html>
