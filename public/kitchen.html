<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kitchen Auto Print</title>
</head>

<body>

<h2>🖨️ Kitchen Auto Print</h2>
<div id="log"></div>

<script>

let printedOrders = new Set()
let isPrinting = false   // 🔥 กันยิงซ้อน

async function checkOrders(){

  if(isPrinting) return   // ❌ ถ้ากำลังพิมอยู่ หยุดก่อน

  try{

    const res = await fetch("/api/get-latest-order")
    const orders = await res.json()

    for(const order of orders){

      if(printedOrders.has(order.id)) continue

      printedOrders.add(order.id)

      await print(order)   // 🔥 รอพิมทีละบิล
    }

  }catch(err){
    console.log(err)
  }

}

function delay(ms){
  return new Promise(res=>setTimeout(res, ms))
}

async function print(order){

  isPrinting = true

  const text = buildText(order)

  // 🔥 ใช้ iframe แทน redirect
  const iframe = document.createElement("iframe")
  iframe.style.display = "none"

  iframe.src = "rawbt:print?text=" + encodeURIComponent(text)

  document.body.appendChild(iframe)

  log("🖨️ PRINT #" + order.id)

  // ⏳ รอให้พิมเสร็จ
  await delay(3000)

  // 🧹 ลบ iframe
  document.body.removeChild(iframe)

  isPrinting = false
}

function buildText(order){

  let text = ""
  text += "🧾 ใบเสร็จ\n"
  text += "Order #" + order.id + "\n"
  text += "----------------\n"

  order.items.forEach(i=>{
    text += `${i.name} ${i.price}฿\n`
  })

  text += "----------------\n"
  text += "รวม " + order.total + " บาท\n"

  return text
}

function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>"
}

// 🔁 เช็คทุก 3 วิ
setInterval(checkOrders, 3000)

</script>

</body>
</html>
