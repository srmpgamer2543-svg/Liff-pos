<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:12px;
font-size:20px;
}

#categories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
gap:8px;
}

.cat-btn{
padding:8px 14px;
border-radius:20px;
background:#eee;
cursor:pointer;
}

#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.item{
background:white;
border-radius:10px;
padding:10px;
}

.item img{
width:100%;
border-radius:8px;
}

.cart-button{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:14px;
border-radius:50%;
cursor:pointer;
}

#cart{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:white;
transition:.3s;
box-shadow:-3px 0 10px rgba(0,0,0,.1);
padding:10px;
}

</style>
</head>

<body>

<header>POS</header>

<div id="categories"></div>

<div id="menu"></div>

<div class="cart-button" onclick="toggleCart()">🛒</div>

<div id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<button onclick="checkout()">Checkout</button>
</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
