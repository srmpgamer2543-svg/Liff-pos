<script>

async function loadMenu(){

const res = await fetch("/api/menu")
const data = await res.json()

const el = document.getElementById("menu")

el.innerHTML = ""

data.forEach(item=>{

const price = item.price || 0

el.innerHTML += `
<div class="menu">
<h3>${item.name}</h3>
<p>${price} บาท</p>

<button onclick="order('${item.id}','${item.name}',${price})">
สั่งอาหาร
</button>

</div>
`

})

}

function order(id,name,price){

alert("เพิ่ม "+name+" ลงตะกร้า")

}

loadMenu()

</script>
