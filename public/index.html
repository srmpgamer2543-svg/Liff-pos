<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Menu</title>

<style>

body{
font-family:sans-serif;
padding:20px;
background:#f5f5f5;
}

.menu{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
background:#06c755;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
}

</style>

</head>

<body>

<h2>Menu</h2>

<div id="menu">Loading...</div>

<script>

async function loadMenu(){

try{

const res = await fetch("/api/menu")
const data = await res.json()

const el = document.getElementById("menu")

el.innerHTML=""

data.forEach(item=>{

const price = item.price || 0

const div = document.createElement("div")
div.className="menu"

div.innerHTML = `
<h3>${item.name}</h3>
<p>${price} บาท</p>
<button onclick="order('${item.name}')">สั่ง</button>
`

el.appendChild(div)

})

}catch(e){

document.getElementById("menu").innerHTML="Error loading menu"

}

}

function order(name){

alert("เพิ่ม "+name+" แล้ว")

}

loadMenu()

</script>

</body>
</html>
