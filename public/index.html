<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<title>POS Menu</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
}

/* Header */

.header{
text-align:center;
padding:25px;
background:white;
}

.header h2{
font-size:32px;
margin:0;
}

.logo{
width:180px;
margin-top:10px;
}

/* หมวดหมู่ */

.categories{
display:flex;
overflow:auto;
padding:15px;
gap:12px;
}

.cat{
background:#eee;
padding:12px 22px;
border-radius:25px;
white-space:nowrap;
cursor:pointer;
font-size:20px;
font-weight:bold;
}

/* เมนูสินค้า */

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

/* การ์ดสินค้า */

.card{
background:white;
border-radius:15px;
padding:12px;
box-shadow:0 3px 6px rgba(0,0,0,0.12);
}

.card img{
width:100%;
border-radius:12px;
}

/* ชื่อเมนู */

.name{
font-size:24px;
margin-top:10px;
font-weight:bold;
}

/* ราคา */

.price{
color:#1db954;
font-weight:bold;
font-size:22px;
margin-top:5px;
}

/* ปุ่มเพิ่ม */

.add{
float:right;
background:#1db954;
color:white;
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h2>POS MENU</h2>
</div>

<div class="categories" id="categories"></div>

<div class="menu" id="menu"></div>

<script>

async function loadMenu(){

const res = await fetch("/api/get-menu")
const data = await res.json()

const menuDiv = document.getElementById("menu")

menuDiv.innerHTML = ""

data.forEach(item => {

menuDiv.innerHTML += `
<div class="card">
<img src="${item.image || 'https://via.placeholder.com/300'}">

<div class="name">
${item.name}
</div>

<div class="price">
${item.price} บาท
<button class="add">+</button>
</div>

</div>
`

})

}

loadMenu()

</script>

</body>

</html>
