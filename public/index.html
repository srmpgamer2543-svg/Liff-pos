<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:12px;
font-size:20px;
}

#categories{
display:flex;
overflow-x:auto;
background:white;
padding:14px;
gap:14px;
}

/* ปรับปุ่มหมวดใหญ่ขึ้น */
.cat-btn{
padding:20px 40px;
border-radius:40px;
background:#eee;
cursor:pointer;
font-size:22px;
font-weight:bold;
white-space:nowrap;
}

#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.item{
background:white;
border-radius:12px;
padding:10px;
}

/* รูปเมนู 16:9 */
.item img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
border-radius:10px;
}

.item h3{
font-size:18px;
margin:8px 0 4px;
}

.item p{
font-size:16px;
color:#2e7d32;
font-weight:bold;
margin:0;
}

.item button{
margin-top:8px;
padding:8px;
border:none;
border-radius:6px;
background:#4caf50;
color:white;
font-size:14px;
cursor:pointer;
}

.cart-button{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:14px;
border-radius:50%;
cursor:pointer;
}

#cart{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:white;
transition:.3s;
box-shadow:-3px 0 10px rgba(0,0,0,.1);
padding:10px;
}

</style>
</head>

<body>

<header>POS</header>

<div id="categories"></div>

<div id="menu"></div>

<div class="cart-button" onclick="toggleCart()">🛒</div>

<div id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<button onclick="checkout()">Checkout</button>
</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
