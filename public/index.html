<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<title>POS Menu</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
text-align:center;
padding:20px;
background:white;
font-size:30px;
font-weight:bold;
}

/* หมวดหมู่ */

.categories{
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;
background:white;
position:sticky;
top:0;
z-index:10;
}

.cat{
background:#eee;
padding:10px 18px;
border-radius:20px;
white-space:nowrap;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.cat.active{
background:#1db954;
color:white;
}

.menu{
padding:10px;
}

.category-title{
font-size:24px;
font-weight:bold;
margin-top:20px;
margin-bottom:10px;
}

/* เมนู */

.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
border-radius:15px;
padding:12px;
box-shadow:0 3px 6px rgba(0,0,0,0.12);
}

.card img{
width:100%;
border-radius:12px;
}

.name{
font-size:20px;
margin-top:8px;
font-weight:bold;
}

.price{
color:#1db954;
font-weight:bold;
font-size:18px;
margin-top:5px;
}

.add{
float:right;
background:#1db954;
color:white;
border:none;
width:36px;
height:36px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

/* ตะกร้า */

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff9800;
color:white;
border:none;
padding:15px 18px;
border-radius:30px;
font-size:18px;
font-weight:bold;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
max-height:60%;
border-top-left-radius:20px;
border-top-right-radius:20px;
padding:15px;
display:none;
overflow:auto;
}

</style>

</head>

<body>

<div class="header">
POS MENU
</div>

<!-- ปุ่มหมวด -->
<div class="categories" id="categories"></div>

<!-- เมนู -->
<div class="menu" id="menu"></div>

<button class="cart-btn" onclick="toggleCart()">
🛒 ตะกร้า (<span id="cartCount">0</span>)
</button>

<div class="cart" id="cart">

<h3>ตะกร้าสินค้า</h3>

<div id="cartItems"></div>

<div class="total">
รวม : <span id="totalPrice">0</span> บาท
</div>

<button class="order" onclick="checkout()">
สั่งซื้อ
</button>

</div>

<script>

let menuData = []
let cart = []

async function loadMenu(){

 const menuRes = await fetch("/api/get-menu")
 const menu = await menuRes.json()

 const catRes = await fetch("/api/get-categories")
 const categories = await catRes.json()

 menuData = menu

 const menuContainer = document.getElementById("menu")
 const catContainer = document.getElementById("categories")

 menuContainer.innerHTML = ""
 catContainer.innerHTML = ""

 /* เรียงหมวดตามเลข 01 02 03 */

 categories.sort((a,b)=>{
  return a.name.localeCompare(b.name)
 })

 categories.forEach((cat,index)=>{

  /* ลบเลขหน้า */

  const cleanName = cat.name.replace(/^\d+_?/,"")

  /* ปุ่มหมวด */

  const btn = document.createElement("div")
  btn.className="cat"
  btn.innerText=cleanName
  btn.onclick=()=>{
   document.getElementById("cat-"+cat.id)
   .scrollIntoView({behavior:"smooth"})
  }

  catContainer.appendChild(btn)

  /* ส่วนเมนู */

  const section=document.createElement("div")

  section.innerHTML=`
  <div class="category-title">${cleanName}</div>
  <div class="menu-grid" id="cat-${cat.id}"></div>
  `

  menuContainer.appendChild(section)

  const grid = section.querySelector(".menu-grid")

  menu
  .filter(item => item.category_id === cat.id)
  .forEach(item => {

   const price = item.variants?.[0]?.price || 0

   grid.innerHTML += `
   <div class="card">

    <img src="${item.image || 'https://via.placeholder.com/300'}">

    <div class="name">${item.name}</div>

    <div class="price">
     ${price} บาท
     <button class="add" onclick="addToCart('${item.id}')">+</button>
    </div>

   </div>
   `

  })

 })

}

/* เพิ่มสินค้า */

function addToCart(id){

 const item = menuData.find(i=>i.id===id)

 if(!item) return

 const price = item.variants?.[0]?.price || 0

 let found = cart.find(i => i.id === id)

 if(found){
  found.qty++
 }else{
  cart.push({
   id:id,
   name:item.name,
   price:price,
   qty:1
  })
 }

 updateCart()

}

/* อัปเดตตะกร้า */

function updateCart(){

 const cartItems = document.getElementById("cartItems")
 const cartCount = document.getElementById("cartCount")
 const totalPrice = document.getElementById("totalPrice")

 cartItems.innerHTML=""

 let total=0
 let count=0

 cart.forEach(item=>{

  total+=item.price*item.qty
  count+=item.qty

  cartItems.innerHTML+=`
  <div>

   ${item.name} x ${item.qty}

  </div>
  `

 })

 cartCount.innerText=count
 totalPrice.innerText=total

}

function toggleCart(){

 const cartBox=document.getElementById("cart")

 cartBox.style.display=
 cartBox.style.display==="block"
 ?"none"
 :"block"

}

function checkout(){

 if(cart.length===0){
  alert("ยังไม่มีสินค้า")
  return
 }

 alert("ส่งออเดอร์แล้ว")

 cart=[]
 updateCart()

}

loadMenu()

</script>

</body>
</html>
