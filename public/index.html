<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>POS</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>Menu</h2>
<div id="menu"></div>

<script>

async function loadMenu(){

  const res = await fetch("/api/menu")
  const data = await res.json()

  const menuDiv = document.getElementById("menu")

  data.forEach(item => {

    const div = document.createElement("div")

    div.innerHTML = `
      <h3>${item.name}</h3>
      <p>${item.price} บาท</p>
      <button onclick="add('${item.id}')">เพิ่ม</button>
    `

    menuDiv.appendChild(div)

  })

}

function add(id){
  alert("เพิ่มสินค้า "+id)
}

loadMenu()

</script>

</body>
</html>
