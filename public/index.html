<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:12px;
font-size:20px;
}

#categories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
gap:8px;
}

.cat-btn{
padding:8px 14px;
border-radius:20px;
background:#eee;
cursor:pointer;
border:none;
}

.cat-btn.active{
background:#22c55e;
color:white;
}

#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.item{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.08);
position:relative;
}

.item img{
width:100%;
height:150px;
object-fit:cover;
}

.item-info{
padding:10px;
}

.item-name{
font-size:16px;
font-weight:600;
}

.item-price{
color:#16a34a;
font-size:18px;
font-weight:bold;
}

.add-btn{
position:absolute;
bottom:10px;
right:10px;
background:#22c55e;
color:white;
border:none;
width:36px;
height:36px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.cart-button{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:14px;
border-radius:50%;
cursor:pointer;
}

#cart{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:white;
transition:.3s;
box-shadow:-3px 0 10px rgba(0,0,0,.1);
padding:10px;
}

</style>
</head>

<body>

<header>POS</header>

<div id="categories"></div>

<div id="menu"></div>

<div class="cart-button" onclick="toggleCart()">🛒</div>

<div id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<button onclick="checkout()">Checkout</button>
</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
