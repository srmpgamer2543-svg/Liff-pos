<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:12px;
font-size:20px;
}

#categories{
display:flex;
overflow-x:auto;
background:white;
padding:14px;
gap:14px;
}

/* ชื่อหมวด */
.cat-btn{
padding:18px 36px;
border-radius:40px;
background:#eee;
cursor:pointer;
font-size:30px;
font-weight:bold;
white-space:nowrap;
}

#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

.item{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
position:relative;
display:flex;
flex-direction:column;
}

/* รูปเมนู 16:9 */
.item img{
width:100%;
aspect-ratio:9/16;
object-fit:cover;
display:block;
}

/* กล่องข้อมูล */
.item-info{
padding:14px;
}

/* ชื่อเมนู */
.item-name{
font-size:20px;
font-weight:bold;
line-height:1.2;
margin-bottom:6px;
}

/* ราคา */
.item-price{
font-size:18px;
color:#2e7d32;
font-weight:bold;
}

/* ปุ่ม + */
.add-btn{
position:absolute;
right:16px;
bottom:16px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:#4caf50;
color:white;
font-size:36px;
cursor:pointer;
}

.cart-button{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:14px;
border-radius:50%;
cursor:pointer;
}

#cart{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:white;
transition:.3s;
box-shadow:-3px 0 10px rgba(0,0,0,.1);
padding:10px;
}

</style>
</head>

<body>

<header>POS</header>

<div id="categories"></div>

<div id="menu"></div>

<div class="cart-button" onclick="toggleCart()">🛒</div>

<div id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<button onclick="checkout()">Checkout</button>
</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
