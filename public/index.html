<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>POS</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="header-wrapper">

  <div class="logo-area" id="logoArea">
    <img src="/logo.png">
  </div>

  <<div class="topbar">

  <div class="shop-name">
   🍉🥥🍓เมนูขายดี!แนะนำ✨ ชาไทย+วิปปิ้งครีม🔥  </div>

  <div class="cart-icon">
    🛒 <span id="headerCartCount">0</span>
  </div>

  </div>

  <div id="categories"></div>

</div>

<div id="menuGrid" class="menu-grid"></div>

<div id="cart">
  <h3>Cart</h3>
  <div id="cart-items"></div>
  <button onclick="checkout()">Checkout</button>
</div>

<div id="modifierOverlay">
  <div id="modifierModal"></div>
</div>

<div id="sticky-cart" class="sticky-cart hidden">
  
  <div class="sticky-cart-left">
    🛒 <span id="sticky-cart-count">0</span> รายการ
  </div>

  <div class="sticky-cart-total">
    รวม <span id="sticky-cart-price">0</span> บาท
  </div>

  <button id="confirm-order-btn">
    ยืนยันออเดอร์
  </button>

</div>

<div id="orderScreen" class="order-screen hidden">

  <div class="order-header">
    <button id="backToMenu">← กลับ</button>
    <h2>ตรวจสอบออเดอร์</h2>
  </div>

  <div id="orderList"></div>

  <div class="order-footer">
    <div class="order-total">
      รวม <span id="orderTotal">0</span> บาท
    </div>

    <button id="sendOrderBtn">
      ส่งออเดอร์
    </button>
  </div>

</div>

<script type="module" src="/js/app.js"></script>
<script src="/js/scroll.js"></script>

<!-- 🔧 FIX BUG -->
<script type="module" src="/js/sticky-cart.js"></script>

</body>
</html>
