<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header-wrapper{
position:sticky;
top:0;
z-index:1000;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,.1);
transition:all .35s ease;
}

.logo-area{
display:flex;
justify-content:center;
align-items:center;
padding:18px;
background:#ffffff;
transition:all .35s ease;
}

.logo-area img{
height:70px;
transition:all .35s ease;
}

.logo-hidden{
transform:translateY(-100%);
opacity:0;
height:0;
padding:0;
overflow:hidden;
}

/* top bar */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 16px;
background:white;
border-top:1px solid #eee;
}

.shop-name{
font-size:26px;
font-weight:bold;
}

.cart-btn{
font-size:28px;
cursor:pointer;
}

/* categories */

#categories{
display:flex;
overflow-x:auto;
background:white;
padding:14px;
gap:14px;
border-top:1px solid #eee;
}

/* category button */

.cat-btn{
padding:18px 36px;
border-radius:40px;
background:#eee;
cursor:pointer;
font-size:30px;
font-weight:bold;
white-space:nowrap;
}

/* menu grid */

#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

.item{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
position:relative;
display:flex;
flex-direction:column;
}

.item img{
width:100%;
aspect-ratio:9/16;
object-fit:cover;
display:block;
}

/* item info */

.item-info{
padding:14px;
}

.item-name{
font-size:40px;
font-weight:700;
line-height:1.3;
margin-bottom:4px;
}

.item-price{
font-size:35px;
color:#2e7d32;
font-weight:700;
}

/* add button */

.add-btn{
position:absolute;
right:16px;
bottom:16px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:#4caf50;
color:white;
font-size:36px;
cursor:pointer;
}

/* floating cart */

.cart-button{
display:none;
}

/* cart panel */

#cart{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:white;
transition:.3s;
box-shadow:-3px 0 10px rgba(0,0,0,.1);
padding:10px;
}

</style>
</head>

<body>

<div class="header-wrapper">

<div class="logo-area" id="logoArea">
<img src="/logo.png" alt="logo">
</div>

<div class="topbar">
<div class="shop-name">🍞มีนม.ขนมปัง.🍞</div>
<div class="cart-btn" onclick="toggleCart()">🛒</div>
</div>

<div id="categories"></div>

</div>

<div id="menu"></div>

<div id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<button onclick="checkout()">Checkout</button>
</div>

<script type="module" src="/js/app.js"></script>

<script>

/* hide logo on scroll */

let lastScroll=0

window.addEventListener("scroll",()=>{

const logo=document.getElementById("logoArea")
const current=window.scrollY

if(current>80){

logo.classList.add("logo-hidden")

}else{

logo.classList.remove("logo-hidden")

}

})

</script>

</body>
</html>
