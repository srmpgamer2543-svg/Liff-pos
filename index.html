<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbz8_IG78KrGiV7Kg9gJBGA7tcH79vmDVgEIUWPbUBy-SDTM1mjAJ5znm8dYGbfa1m9Q/exec";

let ITEMS = [];
let MODIFIERS = [];
let CART = [];

async function loadData() {
  try {
    // items เป็น array ตรง ๆ
    const itemsRes = await fetch(BASE_URL + "?path=items");
    const itemsData = await itemsRes.json();
    ITEMS = Array.isArray(itemsData) ? itemsData : (itemsData.items || []);

    // modifiers ก็รองรับทั้ง array และ {modifiers:[]}
    const modRes = await fetch(BASE_URL + "?path=modifiers");
    const modData = await modRes.json();
    MODIFIERS = Array.isArray(modData) ? modData : (modData.modifiers || []);

    renderMenu();
  } catch (err) {
    console.error("LOAD ERROR:", err);
    document.body.innerHTML = "<h2 style='padding:20px'>โหลดข้อมูลไม่สำเร็จ</h2>";
  }
}

function renderMenu() {
  const menuDiv = document.getElementById("menu");
  menuDiv.innerHTML = "";

  ITEMS.forEach(item => {
    const price = parseFloat(item?.variants?.[0]?.default_price || 0);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div>${item.item_name}</div>
      <div class="price">${price} บาท</div>
    `;
    card.onclick = () => openItem(item);

    menuDiv.appendChild(card);
  });
}

function openItem(item) {
  const basePrice = parseFloat(item?.variants?.[0]?.default_price || 0);

  let selected = {
    sweetness: null,
    type: null,
    toppings: []
  };

  let total = basePrice;

  // รองรับทั้ง modifier_ids และ modifier_list_ids
  const itemModifierIds = item.modifier_ids || item.modifier_list_ids || [];

  const relatedModifiers = MODIFIERS.filter(m =>
    itemModifierIds.includes(m.modifier_list_id || m.id)
  );

  const groups = {};
  relatedModifiers.forEach(mod => {
    const group = mod.modifier_list_name || "อื่นๆ";
    if (!groups[group]) groups[group] = [];
    groups[group].push(mod);
  });

  const modal = document.createElement("div");
  modal.style.position = "fixed";
  modal.style.bottom = "0";
  modal.style.left = "0";
  modal.style.right = "0";
  modal.style.background = "white";
  modal.style.padding = "20px";
  modal.style.borderRadius = "20px 20px 0 0";
  modal.style.maxHeight = "80vh";
  modal.style.overflowY = "auto";
  modal.style.boxShadow = "0 -4px 20px rgba(0,0,0,0.2)";

  modal.innerHTML = `<h3>${item.item_name}</h3>`;

  const totalDiv = document.createElement("div");
  totalDiv.style.marginTop = "15px";

  const addBtn = document.createElement("button");
  addBtn.style.marginTop = "10px";
  addBtn.style.background = "#16a34a";
  addBtn.style.color = "white";
  addBtn.style.width = "100%";
  addBtn.style.padding = "12px";
  addBtn.style.borderRadius = "10px";

  function updateTotal() {
    total = basePrice;

    if (selected.sweetness) total += parseFloat(selected.sweetness.price || 0);
    if (selected.type) total += parseFloat(selected.type.price || 0);
    selected.toppings.forEach(t => total += parseFloat(t.price || 0));

    totalDiv.innerHTML = "รวม: " + total + " บาท";
    addBtn.innerHTML = "เพิ่มลงตะกร้า (" + total + " บาท)";
  }

  Object.keys(groups).forEach(groupName => {
    const groupDiv = document.createElement("div");
    groupDiv.innerHTML = `<h4>${groupName}</h4>`;

    groups[groupName].forEach(mod => {
      const wrapper = document.createElement("div");
      const input = document.createElement("input");

      if (groupName === "ระดับความหวาน" || groupName === "เย็น/ปั่น") {
        input.type = "radio";
        input.name = groupName;
      } else {
        input.type = "checkbox";
      }

      input.onchange = () => {
        if (groupName === "ระดับความหวาน")
          selected.sweetness = mod;
        else if (groupName === "เย็น/ปั่น")
          selected.type = mod;
        else {
          if (input.checked)
            selected.toppings.push(mod);
          else
            selected.toppings = selected.toppings.filter(x => x.id !== mod.id);
        }
        updateTotal();
      };

      wrapper.appendChild(input);
      wrapper.append(" " + (mod.name || mod.modifier_name) + " +" + (mod.price || 0) + " บาท");
      groupDiv.appendChild(wrapper);
    });

    modal.appendChild(groupDiv);
  });

  updateTotal();

  addBtn.onclick = () => {
    if (!selected.sweetness) {
      alert("กรุณาเลือกระดับความหวาน");
      return;
    }
    if (!selected.type) {
      alert("กรุณาเลือก เย็น หรือ ปั่น");
      return;
    }

    CART.push(total);
    updateCart();
    document.body.removeChild(modal);
  };

  modal.appendChild(totalDiv);
  modal.appendChild(addBtn);
  document.body.appendChild(modal);
}

function updateCart() {
  const totalAmount = CART.reduce((a,b) => a+b,0);
  document.getElementById("total").innerText = totalAmount;
}

function clearCart() {
  CART = [];
  updateCart();
}

function order() {
  const totalAmount = CART.reduce((a,b) => a+b,0);
  alert("ยอดทั้งหมด " + totalAmount + " บาท");
}

loadData();
</script>
