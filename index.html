<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ร้านสั่งอาหาร</title>
</head>
<body>
  <h2>เมนูอาหาร</h2>
  <div id="menu"></div>

  <script>
    fetch('/api/items')
      .then(res => res.json())
      .then(data => {
        const menu = document.getElementById('menu');
        data.items.forEach(item => {
          const btn = document.createElement('button');
          btn.innerText = item.item_name + ' - ' + item.price + ' บาท';
          menu.appendChild(btn);
          menu.appendChild(document.createElement('br'));
        });
      });
  </script>
</body>
</html>
