<script>

let total = 0;
const menuDiv = document.getElementById("menu");

async function loadMenu() {
  try {
    const res = await fetch("/api/items");
    const items = await res.json();

    menuDiv.innerHTML = "";

    items.forEach(item => {

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div>${item.item_name}</div>
        <div class="price">${item.price} บาท</div>
      `;

      card.onclick = () => openPopup(item);

      menuDiv.appendChild(card);
    });

  } catch (err) {
    menuDiv.innerHTML = "โหลดเมนูไม่สำเร็จ";
    console.error(err);
  }
}

function openPopup(item) {

  let basePrice = item.price;
  let selectedModifiers = [];

  const modal = document.createElement("div");
  modal.style.position = "fixed";
  modal.style.bottom = "0";
  modal.style.left = "0";
  modal.style.right = "0";
  modal.style.background = "white";
  modal.style.padding = "20px";
  modal.style.borderRadius = "20px 20px 0 0";
  modal.style.maxHeight = "80vh";
  modal.style.overflowY = "auto";
  modal.style.boxShadow = "0 -4px 20px rgba(0,0,0,0.3)";

  modal.innerHTML = `<h3>${item.item_name}</h3>`;

  const totalDiv = document.createElement("div");

  function updateTotal() {
    let totalPrice = basePrice;
    selectedModifiers.forEach(m => totalPrice += m.price);
    totalDiv.innerHTML = "รวม: " + totalPrice + " บาท";
    addBtn.innerHTML = "เพิ่มลงตะกร้า ("+ totalPrice +" บาท)";
  }

  // 🔥 ดึง modifier_set จาก Loyverse
  if(item.modifier_sets && item.modifier_sets.length > 0) {

    item.modifier_sets.forEach(set => {

      const setDiv = document.createElement("div");
      setDiv.innerHTML = `<h4>${set.name}</h4>`;

      set.modifiers.forEach(mod => {

        const input = document.createElement("input");
        input.type = set.min_selected === 1 && set.max_selected === 1 ? "radio" : "checkbox";
        input.name = set.name;

        input.onchange = () => {

          if(input.type === "radio") {
            selectedModifiers = selectedModifiers.filter(m => m.set !== set.name);
          }

          if(input.checked) {
            selectedModifiers.push({
              set: set.name,
              name: mod.name,
              price: mod.price
            });
          } else {
            selectedModifiers = selectedModifiers.filter(m => m.name !== mod.name);
          }

          updateTotal();
        };

        setDiv.appendChild(input);
        setDiv.append(" " + mod.name + " +" + mod.price);
        setDiv.appendChild(document.createElement("br"));
      });

      modal.appendChild(setDiv);
    });
  }

  const addBtn = document.createElement("button");
  addBtn.style.marginTop = "15px";
  addBtn.style.background = "#16a34a";
  addBtn.style.color = "white";
  addBtn.style.width = "100%";
  addBtn.style.padding = "12px";
  addBtn.style.borderRadius = "10px";
  addBtn.innerHTML = "เพิ่มลงตะกร้า ("+basePrice+" บาท)";

  addBtn.onclick = () => {
    addToCart(basePrice + selectedModifiers.reduce((a,b)=>a+b.price,0));
    document.body.removeChild(modal);
  };

  modal.appendChild(totalDiv);
  modal.appendChild(addBtn);
  document.body.appendChild(modal);

  updateTotal();
}

function addToCart(price) {
  total += price;
  document.getElementById("total").innerText = total;
}

function clearCart() {
  total = 0;
  document.getElementById("total").innerText = total;
}

function order() {
  alert("ยอดทั้งหมด " + total + " บาท");
}

loadMenu();

</script>
