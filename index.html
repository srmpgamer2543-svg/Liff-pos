<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbz8_IG78KrGiV7Kg9gJBGA7tcH79vmDVgEIUWPbUBy-SDTM1mjAJ5znm8dYGbfa1m9Q/exec";

let ITEMS = [];
let MODIFIERS = [];
let CART = [];

async function loadData() {
  const itemsRes = await fetch(BASE_URL + "?path=items");
  const itemsData = await itemsRes.json();
  ITEMS = itemsData.items;

  const modRes = await fetch(BASE_URL + "?path=modifiers");
  const modData = await modRes.json();
  MODIFIERS = modData.modifiers;

  renderMenu();
}

function renderMenu() {
  const menuDiv = document.getElementById("menu");
  menuDiv.innerHTML = "";

  ITEMS.forEach(item => {
    const price = item.variants[0].price;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div>${item.item_name}</div>
      <div class="price">${price} บาท</div>
    `;
    card.onclick = () => openItem(item);

    menuDiv.appendChild(card);
  });
}

function openItem(item) {
  const basePrice = parseFloat(item.variants[0].price);

  let selected = {
    sweetness: null,
    type: null,
    toppings: []
  };

  let total = basePrice;

  const relatedModifiers = MODIFIERS
    .filter(m => item.modifier_ids?.includes(m.id));

  const groups = {};
  relatedModifiers.forEach(mod => {
    const group = mod.modifier_list_name;
    if (!groups[group]) groups[group] = [];
    groups[group].push(mod);
  });

  let modal = document.createElement("div");
  modal.style.position = "fixed";
  modal.style.bottom = "0";
  modal.style.left = "0";
  modal.style.right = "0";
  modal.style.background = "white";
  modal.style.padding = "20px";
  modal.style.borderRadius = "20px 20px 0 0";
  modal.style.maxHeight = "80vh";
  modal.style.overflowY = "auto";
  modal.style.boxShadow = "0 -4px 20px rgba(0,0,0,0.2)";

  modal.innerHTML = `<h3>${item.item_name}</h3>`;

  function updateTotal() {
    total = basePrice;

    if (selected.sweetness) total += parseFloat(selected.sweetness.price);
    if (selected.type) total += parseFloat(selected.type.price);
    selected.toppings.forEach(t => total += parseFloat(t.price));

    totalDiv.innerHTML = "รวม: " + total + " บาท";
    addBtn.innerHTML = "เพิ่มลงตะกร้า (" + total + " บาท)";
  }

  Object.keys(groups).forEach(groupName => {
    const groupDiv = document.createElement("div");
    groupDiv.innerHTML = `<h4>${groupName}</h4>`;

    groups[groupName].forEach(mod => {

      const wrapper = document.createElement("div");

      const input = document.createElement("input");

      if (groupName === "ระดับความหวาน" || groupName === "เย็น/ปั่น") {
        input.type = "radio";
        input.name = groupName;
      } else {
        input.type = "checkbox";
      }

      input.onchange = () => {
        if (groupName === "ระดับความหวาน")
          selected.sweetness = mod;

        else if (groupName === "เย็น/ปั่น")
          selected.type = mod;

        else {
          if (input.checked)
            selected.toppings.push(mod);
          else
            selected.toppings = selected.toppings.filter(x => x.id !== mod.id);
        }

        updateTotal();
      };

      wrapper.appendChild(input);
      wrapper.append(" " + mod.name + " +" + mod.price + " บาท");
      groupDiv.appendChild(wrapper);
    });

    modal.appendChild(groupDiv);
  });

  const totalDiv = document.createElement("div");
  totalDiv.style.marginTop = "15px";
  totalDiv.innerHTML = "รวม: " + total + " บาท";

  const addBtn = document.createElement("button");
  addBtn.style.marginTop = "10px";
  addBtn.style.background = "#16a34a";
  addBtn.style.color = "white";
  addBtn.style.width = "100%";
  addBtn.style.padding = "12px";
  addBtn.style.borderRadius = "10px";

  addBtn.innerHTML = "เพิ่มลงตะกร้า (" + total + " บาท)";

  addBtn.onclick = () => {

    if (!selected.sweetness) {
      alert("กรุณาเลือกระดับความหวาน");
      return;
    }

    if (!selected.type) {
      alert("กรุณาเลือก เย็น หรือ ปั่น");
      return;
    }

    CART.push(total);
    updateCart();

    document.body.removeChild(modal);
  };

  modal.appendChild(totalDiv);
  modal.appendChild(addBtn);

  document.body.appendChild(modal);
}

function updateCart() {
  const totalAmount = CART.reduce((a,b) => a+b,0);
  document.getElementById("total").innerText = totalAmount;
}

function clearCart() {
  CART = [];
  updateCart();
}

function order() {
  const totalAmount = CART.reduce((a,b) => a+b,0);
  alert("ยอดทั้งหมด " + totalAmount + " บาท");
}

loadData();
    </script>
